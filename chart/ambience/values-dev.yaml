domain:
  host: ambience.dev.romaine.life
  tlsSecretName: ambience-wildcard-tls

image:
  tag: "app-1f2c3184eb9262537828760ddf61d4ce1230f5f9e8b3a90b1dee4aadc721ee80"

# Dev no longer provisions its own per-host cert + listener — it shares the
# wildcard infrastructure below with all ephemeral environments under
# *.ambience.dev.romaine.life.
certificate:
  enabled: false

gateway:
  listenerSetEnabled: false

wildcardCertificate:
  enabled: true

testEnv:
  wildcardListenerSetNamespace: ambience-dev

route:
  attachListenerSet:
    name: ambience-wildcard

edge:
  replicas: 1
  terminationGracePeriodSeconds: 3
  shutdownDrain: 1s
  probes:
    readiness:
      periodSeconds: 2
      timeoutSeconds: 1
      failureThreshold: 2
    liveness:
      periodSeconds: 2
      timeoutSeconds: 1
      failureThreshold: 3
authority:
  probes:
    readiness:
      periodSeconds: 2
      timeoutSeconds: 1
      failureThreshold: 2
    liveness:
      periodSeconds: 2
      timeoutSeconds: 1
      failureThreshold: 3
  # Dev cycles effects quickly so a reviewer can watch rotation fire
  # without waiting 10 minutes. Prod stays on the default 10m cadence.
  rotation:
    cadence: 90s

pdb:
  enabled: false
