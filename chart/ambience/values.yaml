image:
  repository: ghcr.io/nelsong6/ambience
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

gateway:
  enabled: true
  namespace: envoy-gateway-system
  name: shared-gateway
  sectionName: https

domain:
  host: ambience.dev.romaine.life
  wildcardHost: "*.ambience.dev.romaine.life"
  tlsSecretName: ambience-wildcard-tls
  issuerRef:
    name: letsencrypt-prod-dns01
    kind: ClusterIssuer
  # Listener-level allowedRoutes.namespaces.from. "All" lets ambience-pr-*
  # and ambience-issue-* HTTPRoutes attach without per-namespace plumbing.
  allowedFromNamespaces: All

service:
  port: 80
  targetPort: http

oauth:
  microsoft:
    tenant: 2236b5e4-81d2-4d82-bde5-17b1037999ea
  externalSecret:
    enabled: false
    name: ambience-oauth
    storeName: romaine-kv
    storeKind: ClusterSecretStore
    refreshInterval: 1h
    clientIdKey: ambience-oauth-client-id

edge:
  enabled: true
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  drain:
    shutdown: 12s
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

authority:
  enabled: true
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  persistence:
    enabled: true
    existingClaim: ""
    storageClassName: ""
    size: 1Gi
    accessModes:
      - ReadWriteOnce
  rotation:
    enabled: true
    cadence: 10m
  persist:
    path: /data/shared-atmosphere.json
    interval: 30s
  controlAuth:
    existingSecret: ""
    passwordKey: password
    microsoft:
      enabled: false
      existingSecret: ambience-oauth
      clientIdKey: client-id
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

pdb:
  enabled: false
  minAvailable: 1

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
