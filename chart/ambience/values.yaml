nameOverride: ambience

renderMode: normal

testEnv:
  # Stable slot identity for warm/hot Glimmung native validation slots.
  # Required when renderMode is warm or hot because split Helm releases use
  # different release names while rendering the same slot-local hostnames.
  slotName: ""
  recordBase: ambience.dev.romaine.life
  wildcardListenerSetName: ambience-wildcard
  wildcardListenerSetNamespace: ambience

image:
  repository: romainecr.azurecr.io/ambience
  # SHA-pinned, kept in lockstep with chart/ambience/values-prod.yaml.
  # The build workflow rewrites BOTH files on every push to main via a
  # `[skip ci]` follow-up commit (see .github/workflows/build-and-deploy.yml),
  # so consumers that install this chart with only the default values —
  # notably Glimmung-managed test slots — always default to the same
  # image prod is running. Quote so all-digit short SHAs aren't
  # reformatted as scientific notation by YAML.
  tag: "app-8c22418a5f53eac7a37f472f31883fb4df06f0847c5a76a88c2ee2b6aaded4be"
  pullPolicy: Always

domain:
  host: ambience.romaine.life
  tlsSecretName: ambience-tls

gateway:
  parentGateway:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: main
    namespace: envoy-gateway-system
  # Per-app HTTPS listener (used by prod for ambience.romaine.life). Dev and
  # ephemeral envs share a wildcard listener instead — see wildcardCertificate.
  listenerSetEnabled: true
  listenerSetName: ambience
  listenerName: https

# Shared wildcard infrastructure. Provisioned once by the continuously synced
# app release. The cert covers the dev base host AND any subdomain via DNS-01
# (HTTP-01 cannot issue wildcards). Per-issue and per-PR ephemeral
# environments attach HTTPRoutes to the resulting XListenerSet so they don't
# each provision their own cert and listener.
wildcardCertificate:
  enabled: false
  name: ambience-wildcard
  hosts:
    - ambience.dev.romaine.life
    - "*.ambience.dev.romaine.life"
  tlsSecretName: ambience-wildcard-tls
  issuerRef:
    name: letsencrypt-prod-dns01
    kind: ClusterIssuer
  # Listener-level allowedRoutes.namespaces.from. "All" lets ambience-pr-*
  # and ambience-issue-* HTTPRoutes attach without per-namespace plumbing.
  allowedFromNamespaces: All

service:
  port: 80
  targetPort: http

oauth:
  microsoft:
    tenant: 2236b5e4-81d2-4d82-bde5-17b1037999ea
  externalSecret:
    enabled: false
    name: ambience-oauth
    createStore: true
    storeName: ng6-ambience
    storeKind: ClusterSecretStore
    vaultUrl: https://ng6-ambience.vault.azure.net
    refreshInterval: 1h
    clientIdKey: ambience-oauth-client-id

edge:
  enabled: true
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  replicas: 2
  strategy:
    maxSurge: 1
    maxUnavailable: 0
  terminationGracePeriodSeconds: 20
  probes:
    readiness:
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3
    liveness:
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3
  authorityURL: http://ambience-authority-client
  shutdownDrain: 12s
  webOverride:
    enabled: false
    mountPath: /var/run/ambience-web-override
    containerName: web-sync
    sidecarImage: alpine:3.20
    sidecarImagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

authority:
  enabled: true
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  replicas: 1
  terminationGracePeriodSeconds: 15
  probes:
    readiness:
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3
    liveness:
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    fsGroupChangePolicy: OnRootMismatch
  # Cosmos-backed shared atmosphere persistence. The authority writes one
  # document keyed by `documentId` to the configured container every
  # `interval` and reads it back on startup so pod restarts resume the
  # live world. Wiring is per-deployment: set `serviceAccountClientId` on
  # the ambience-identity managed identity (provisioned in tofu) and
  # endpoint/database/container point at infra-cosmos-serverless. Leaving
  # endpoint empty disables persistence (used by preview slots that are
  # explicitly ephemeral).
  cosmos:
    endpoint: ""
    database: ambience
    container: atmosphere
    documentId: shared
    interval: 30s
    # ambience-identity client_id from tofu output. Annotated onto the
    # default ServiceAccount in the release namespace so the workload-
    # identity webhook projects a federated token into the authority pod.
    serviceAccountClientId: ""
  # Cross-effect rotation policy. The shared atmosphere periodically
  # swaps to a different effect type so the live broadcast monitor at /
  # cycles on its own. Cadence is the duration each effect runs before
  # the next pick (5–15 minutes feels coherent without going stale).
  # Empty effects means every registered effect is eligible. Add effect
  # names here to narrow the live pool for production guardrails or a
  # focused review session.
  rotation:
    enabled: true
    cadence: 10m
    effects: []
  controlAuth:
    existingSecret: ""
    passwordKey: password
    microsoft:
      enabled: false
      existingSecret: ambience-oauth
      clientIdKey: client-id
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  hotSwapBackend:
    enabled: true
    mountPath: /var/run/ambience-hot
    target: /var/run/ambience-hot/ambience
    childCommand: /ambience
    writerContainerName: hot-writer
    writerImage: alpine:3.20
    writerImagePullPolicy: IfNotPresent

pdb:
  enabled: true
  # authority is a single-replica StatefulSet; a PDB on it blocks every
  # AKS node drain (the eviction API can't satisfy minAvailable:1 with
  # only one pod total, so kubelet eviction returns 429 forever). Until
  # authority is HA, keep this off and accept the brief unavailability
  # during planned cluster maintenance.
  authority:
    enabled: false
    minAvailable: 1
  edge:
    enabled: true
    minAvailable: 1

certificate:
  enabled: true
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer

route:
  enabled: true
  externalDns:
    enabled: true
  requestTimeout: 0s
  backendRequestTimeout: 0s
  # Override which XListenerSet the HTTPRoute attaches to. Defaults
  # to the per-app set in this release's namespace. For ephemeral
  # envs, point at the wildcard listener in ambience-dev.
  attachListenerSet:
    name: ""        # empty → gateway.listenerSetName
    namespace: ""   # empty → release namespace
