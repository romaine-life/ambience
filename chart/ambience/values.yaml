nameOverride: ambience

image:
  repository: romainecr.azurecr.io/ambience
  tag: 700c1d0
  pullPolicy: Always

domain:
  host: ambience.romaine.life
  tlsSecretName: ambience-tls

gateway:
  parentGateway:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: main
    namespace: envoy-gateway-system
  listenerSetName: ambience
  listenerName: https

service:
  port: 80
  targetPort: http

edge:
  enabled: true
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  replicas: 2
  strategy:
    maxSurge: 1
    maxUnavailable: 0
  terminationGracePeriodSeconds: 20
  authorityURL: http://ambience-authority-client
  shutdownDrain: 12s
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

authority:
  enabled: true
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  replicas: 1
  terminationGracePeriodSeconds: 15
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    fsGroupChangePolicy: OnRootMismatch
  persistPath: /data/shared-atmosphere.json
  persistInterval: 30s
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  storage:
    existingClaim: ambience-state
    size: 1Gi

pdb:
  enabled: true
  authority:
    minAvailable: 1
  edge:
    minAvailable: 1

certificate:
  enabled: true
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer

route:
  enabled: true
  requestTimeout: 0s
  backendRequestTimeout: 0s
