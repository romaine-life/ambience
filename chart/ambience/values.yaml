nameOverride: ambience

renderMode: normal

testEnv:
  # Stable slot identity for warm/hot Glimmung native validation slots.
  # Required when renderMode is warm or hot because split Helm releases use
  # different release names while rendering the same slot-local hostnames.
  slotName: ""
  recordBase: ambience.dev.romaine.life
  wildcardListenerSetName: ambience-wildcard
  wildcardListenerSetNamespace: ambience

image:
  repository: romainecr.azurecr.io/ambience
  # Fingerprint-pinned, kept in lockstep with chart/ambience/values-prod.yaml.
  # The build workflow rewrites BOTH files on every push to main via a
  # `[skip ci]` follow-up commit (see .github/workflows/build-and-deploy.yml),
  # so consumers that install this chart with only the default values —
  # notably Glimmung-managed test slots — always default to the same
  # app-<fingerprint> image prod is running.
  tag: "app-765a952a208fb14198ba629ceaffd52d7056e92a1a15e72af8fa1a51284f1240"
  pullPolicy: Always

domain:
  host: ambience.romaine.life
  tlsSecretName: ambience-tls

gateway:
  parentGateway:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: main
    namespace: envoy-gateway-system
  # Per-app HTTPS listener (used by prod for ambience.romaine.life). Dev and
  # ephemeral envs share a wildcard listener instead — see wildcardCertificate.
  listenerSetEnabled: true
  listenerSetName: ambience
  listenerName: https

# Shared wildcard infrastructure. Provisioned once by the continuously synced
# app release. The cert covers the dev base host AND any subdomain via DNS-01
# (HTTP-01 cannot issue wildcards). Per-issue and per-PR ephemeral
# environments attach HTTPRoutes to the resulting XListenerSet so they don't
# each provision their own cert and listener.
wildcardCertificate:
  enabled: false
  name: ambience-wildcard
  hosts:
    - ambience.dev.romaine.life
    - "*.ambience.dev.romaine.life"
  tlsSecretName: ambience-wildcard-tls
  issuerRef:
    name: letsencrypt-prod-dns01
    kind: ClusterIssuer
  # Listener-level allowedRoutes.namespaces.from. "All" lets ambience-pr-*
  # and ambience-issue-* HTTPRoutes attach without per-namespace plumbing.
  allowedFromNamespaces: All

service:
  port: 80
  targetPort: http

edge:
  enabled: true
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  replicas: 2
  strategy:
    maxSurge: 1
    maxUnavailable: 0
  terminationGracePeriodSeconds: 20
  probes:
    readiness:
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3
    liveness:
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3
  authorityURL: http://ambience-authority-client
  shutdownDrain: 12s
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

authority:
  enabled: true
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  replicas: 1
  terminationGracePeriodSeconds: 15
  probes:
    readiness:
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3
    liveness:
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    fsGroupChangePolicy: OnRootMismatch
  # Cosmos-backed shared atmosphere persistence. The authority writes one
  # document keyed by `documentId` to the configured container every
  # `interval` and reads it back on startup so pod restarts resume the
  # live world. Wiring is per-deployment: set `serviceAccountClientId` on
  # the ambience-identity managed identity (provisioned in tofu) and
  # endpoint/database/container point at infra-cosmos-serverless. Leaving
  # endpoint empty disables persistence (used by preview slots that are
  # explicitly ephemeral).
  cosmos:
    endpoint: ""
    database: ambience
    container: atmosphere
    documentId: shared
    interval: 30s
    # ambience-identity client_id from tofu output. Annotated onto the
    # default ServiceAccount in the release namespace so the workload-
    # identity webhook projects a federated token into the authority pod.
    serviceAccountClientId: ""
  # Cross-effect rotation policy. The shared atmosphere periodically
  # swaps to a different effect type so the live broadcast monitor at /
  # cycles on its own. Cadence is the duration each effect runs before
  # the next pick (5–15 minutes feels coherent without going stale).
  # Empty effects means every registered effect is eligible. Add effect
  # names here to narrow the live pool for production guardrails or a
  # focused review session.
  rotation:
    enabled: true
    cadence: 10m
    effects: []
  controlAuth:
    existingSecret: ""
    passwordKey: password
    # Admins sign in through auth.romaine.life (OIDC authorization-code + PKCE).
    # The backend (BFF) does the code exchange and verifies the id_token
    # (aud=clientId, iss=issuer). Public client, no secret — register clientId
    # in auth.romaine.life trustedClients.
    oidc:
      enabled: false
      issuer: https://auth.romaine.life
      clientId: ambience
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  hotSwapBackend:
    enabled: true
    mountPath: /var/run/ambience-hot
    target: /var/run/ambience-hot/ambience
    childCommand: /ambience
    writerContainerName: hot-writer
    writerImage: alpine:3.20
    writerImagePullPolicy: IfNotPresent

# Live-preview lane (live-preview-plan.md, Stage 4b). OFF by default, so a
# normal, prod, dev, or validation (warm/hot) render emits NO live-preview edge
# and is byte-identical to today — nothing changes until Glimmung sets
# livePreview.enabled=true on a PREVIEW lease. This is the live-preview lane
# (scratch, for seeing a freshly-pushed frontend over a STABLE backend); it is
# NOT the faithful image-deploy/validation lane and shares no vocabulary with the
# retired hot-swap path.
#
# Topology (the hard case — ambience has its own edge/authority split): the
# generic glimmung-live-preview-edge REPLACES ambience's native edge tier in
# preview mode. The authority StatefulSet is the stable backend; on a preview
# lease the edge is co-located in the authority pod and reverse-proxies it on
# loopback (upstream http://127.0.0.1:8080 — the only model Glimmung's provision
# emits). The native edge Deployment is not rendered, the public Service selects
# the authority pod and targets the edge, and the authority runs WITHOUT hot-swap
# (the two lanes are mutually exclusive). The edge serves the developer's pushed
# frontend override-first and proxies backendPrefixes + fresh-passthrough (no
# override) to the authority, so a fresh preview shows the stable app until the
# first push. Justification for REPLACE over FRONT: the authority (role=authority)
# already serves the frontend assets AND every data route, so the native edge is
# pure horizontal-scale + SSE-fanout + entropy-batching — irrelevant for a
# single co-watched preview pod, where fronting it would only add a redundant
# proxy hop.
#
# The edge uses a DISTINCT served port/name (preview-http:8090) so it coexists
# with the authority's own http:8080 in the same pod (port names are unique per
# pod). Glimmung fills enabled / image.tag / authorizedSubject / upstream.url /
# backendPrefixes via --set per lease and VENDORS the partial into
# charts/live-preview-edge/ at provision time (this chart declares NO Helm
# dependency and commits no copy of it). The single-serving-pod invariant
# (replicas=1; flicker guard, v1 #1419) is enforced by live-preview-edge.replicas.
# Auth is JWKS-only: the edge verifies pushes against auth.romaine.life's public
# RS256 JWKS over HTTPS, so NO projected service-account token is added to the
# slot pod. The spec shape mirrors glimmung k8s/live-preview-edge/values.yaml.
livePreview:
  enabled: false
  image:
    repository: romainecr.azurecr.io/glimmung-live-preview-edge
    # Required when enabled; Glimmung --sets the fingerprint-pinned tag per lease
    # from its control-plane Settings. Empty here on purpose — there is no in-repo
    # lockstep because ambience does not build the edge image (Glimmung owns it).
    tag: ""
    pullPolicy: IfNotPresent
  # The edge's own served port + name. Distinct from the authority's http:8080 so
  # both containers coexist in the authority pod.
  port: 8090
  servedPortName: preview-http
  upstream:
    # The authority's in-pod port; Glimmung --sets this from live_preview.backend_port.
    url: "http://127.0.0.1:8080"
  # Request prefixes always proxied to the authority (the stable backend's data
  # API stays reachable through the edge regardless of override state). Glimmung
  # --sets these from live_preview.backend_prefixes; the default is informational.
  backendPrefixes: []
  # The auth.romaine.life JWT subject permitted to push/delete the override (the
  # preview lease owner). Required when enabled; Glimmung --sets it per lease.
  authorizedSubject: ""
  override:
    volumeName: live-preview-override
    mountPath: /var/run/glimmung-live-preview
  resources: {}

pdb:
  enabled: true
  # authority is a single-replica StatefulSet; a PDB on it blocks every
  # AKS node drain (the eviction API can't satisfy minAvailable:1 with
  # only one pod total, so kubelet eviction returns 429 forever). Until
  # authority is HA, keep this off and accept the brief unavailability
  # during planned cluster maintenance.
  authority:
    enabled: false
    minAvailable: 1
  edge:
    enabled: true
    minAvailable: 1

certificate:
  enabled: true
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer

route:
  enabled: true
  externalDns:
    enabled: true
  requestTimeout: 0s
  backendRequestTimeout: 0s
  # Override which XListenerSet the HTTPRoute attaches to. Defaults
  # to the per-app set in this release's namespace. For ephemeral
  # envs, point at the wildcard listener in ambience-dev.
  attachListenerSet:
    name: ""        # empty → gateway.listenerSetName
    namespace: ""   # empty → release namespace
