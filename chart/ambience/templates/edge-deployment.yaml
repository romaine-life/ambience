{{- if .Values.edge.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ambience.name" . }}-edge
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ambience.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.edge.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.edge.strategy.maxSurge }}
      maxUnavailable: {{ .Values.edge.strategy.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "ambience.edgeSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ambience.edgeSelectorLabels" . | nindent 8 }}
        {{- include "ambience.labels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.edge.terminationGracePeriodSeconds }}
      containers:
        - name: {{ include "ambience.name" . }}
          image: "{{ include "ambience.edgeImage" . }}"
          imagePullPolicy: {{ include "ambience.edgeImagePullPolicy" . }}
          env:
            - name: AMBIENCE_ROLE
              value: edge
            - name: AMBIENCE_AUTHORITY_URL
              value: {{ .Values.edge.authorityURL | quote }}
            - name: AMBIENCE_SHUTDOWN_DRAIN
              value: {{ .Values.edge.shutdownDrain | quote }}
            {{- if .Values.edge.webOverride.enabled }}
            - name: AMBIENCE_WEB_OVERRIDE_DIR
              value: {{ .Values.edge.webOverride.mountPath | quote }}
            {{- end }}
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.edge.resources | nindent 12 }}
          {{- if .Values.edge.webOverride.enabled }}
          volumeMounts:
            - name: web-override
              mountPath: {{ .Values.edge.webOverride.mountPath | quote }}
              readOnly: true
          {{- end }}
        {{- if .Values.edge.webOverride.enabled }}
        - name: {{ .Values.edge.webOverride.containerName }}
          image: {{ .Values.edge.webOverride.sidecarImage | quote }}
          imagePullPolicy: {{ .Values.edge.webOverride.sidecarImagePullPolicy }}
          command:
            - sh
            - -c
            - |
              mkdir -p {{ .Values.edge.webOverride.mountPath | quote }}
              while true; do sleep 3600; done
          volumeMounts:
            - name: web-override
              mountPath: {{ .Values.edge.webOverride.mountPath | quote }}
        {{- end }}
      {{- if .Values.edge.webOverride.enabled }}
      volumes:
        - name: web-override
          emptyDir: {}
      {{- end }}
{{- end }}
