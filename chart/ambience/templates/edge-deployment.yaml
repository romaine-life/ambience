{{- if and .Values.edge.enabled (eq (include "ambience.renderHot" .) "true") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ambience.name" . }}-edge
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ambience.labels" . | nindent 4 }}
spec:
  replicas: {{ include "ambience.edgeReplicas" . }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.edge.strategy.maxSurge }}
      maxUnavailable: {{ .Values.edge.strategy.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "ambience.edgeSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ambience.edgeSelectorLabels" . | nindent 8 }}
        {{- include "ambience.labels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.edge.terminationGracePeriodSeconds }}
      containers:
        - name: {{ include "ambience.name" . }}
          image: "{{ include "ambience.edgeImage" . }}"
          imagePullPolicy: {{ include "ambience.edgeImagePullPolicy" . }}
          env:
            - name: AMBIENCE_ROLE
              value: edge
            - name: AMBIENCE_AUTHORITY_URL
              value: {{ .Values.edge.authorityURL | quote }}
            - name: AMBIENCE_SHUTDOWN_DRAIN
              value: {{ .Values.edge.shutdownDrain | quote }}
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: {{ .Values.edge.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.edge.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.edge.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: {{ .Values.edge.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.edge.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.edge.probes.liveness.failureThreshold }}
          resources:
            {{- toYaml .Values.edge.resources | nindent 12 }}
{{- end }}
