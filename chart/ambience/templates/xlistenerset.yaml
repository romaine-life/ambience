apiVersion: gateway.networking.x-k8s.io/v1alpha1
kind: XListenerSet
metadata:
  name: {{ .Values.gateway.listenerSetName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ambience.labels" . | nindent 4 }}
spec:
  parentRef:
    group: {{ .Values.gateway.parentGateway.group }}
    kind: {{ .Values.gateway.parentGateway.kind }}
    name: {{ .Values.gateway.parentGateway.name }}
    namespace: {{ .Values.gateway.parentGateway.namespace }}
  listeners:
    - name: {{ .Values.gateway.listenerName }}
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.domain.host }}
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: {{ .Values.domain.tlsSecretName }}
