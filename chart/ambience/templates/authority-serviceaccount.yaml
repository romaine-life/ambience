{{- if and .Values.authority.cosmos.serviceAccountClientId (eq (include "ambience.renderWarm" .) "true") }}
# The default ServiceAccount exists in every namespace (auto-created by K8s).
# This manifest annotates it with the ambience-identity client_id so the
# azure-workload-identity webhook projects a federated token into pods that
# carry the `azure.workload.identity/use: "true"` label. Server-side apply
# (used by ArgoCD and helm 3.14+ with --take-ownership) merges the annotation
# onto the existing default SA without touching K8s-managed fields like
# `secrets` or `imagePullSecrets`.
#
# Rendered only when authority.cosmos.serviceAccountClientId is set — preview
# slot deploys leave it empty so this template is skipped and the slot's
# default SA stays unannotated (no persistence, no Cosmos auth needed).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  namespace: {{ .Release.Namespace }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.authority.cosmos.serviceAccountClientId | quote }}
  labels:
    {{- include "ambience.labels" . | nindent 4 }}
{{- end }}
