{{- if .Values.authority.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ambience.name" . }}-authority
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ambience.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "ambience.name" . }}-authority
  replicas: {{ include "ambience.authorityReplicas" . }}
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "ambience.authoritySelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ambience.authoritySelectorLabels" . | nindent 8 }}
        {{- include "ambience.labels" . | nindent 8 }}
        {{- if .Values.authority.cosmos.serviceAccountClientId }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.authority.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.authority.securityContext | nindent 8 }}
      containers:
        - name: {{ include "ambience.name" . }}
          image: "{{ include "ambience.authorityImage" . }}"
          imagePullPolicy: {{ include "ambience.authorityImagePullPolicy" . }}
          {{- if and .Values.testEnv.enabled .Values.authority.hotSwapBackend.enabled }}
          command:
            - /ambience-supervisor
          {{- end }}
          env:
            - name: AMBIENCE_ROLE
              value: authority
            {{- if and .Values.testEnv.enabled .Values.authority.hotSwapBackend.enabled }}
            - name: GLIMMUNG_SUPERVISOR_CHILD
              value: {{ .Values.authority.hotSwapBackend.childCommand | quote }}
            - name: GLIMMUNG_SUPERVISOR_HOT_ARTIFACT
              value: {{ .Values.authority.hotSwapBackend.target | quote }}
            - name: GLIMMUNG_SUPERVISOR_RESTART_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.authority.cosmos.endpoint }}
            - name: AMBIENCE_COSMOS_ENDPOINT
              value: {{ .Values.authority.cosmos.endpoint | quote }}
            - name: AMBIENCE_COSMOS_DATABASE
              value: {{ .Values.authority.cosmos.database | quote }}
            - name: AMBIENCE_COSMOS_CONTAINER
              value: {{ .Values.authority.cosmos.container | quote }}
            - name: AMBIENCE_COSMOS_DOCUMENT_ID
              value: {{ .Values.authority.cosmos.documentId | quote }}
            - name: AMBIENCE_COSMOS_INTERVAL
              value: {{ .Values.authority.cosmos.interval | quote }}
            {{- end }}
            {{- with .Values.authority.rotation }}
            - name: AMBIENCE_ROTATION_ENABLED
              value: {{ .enabled | quote }}
            - name: AMBIENCE_ROTATION_CADENCE
              value: {{ .cadence | quote }}
            {{- if .effects }}
            - name: AMBIENCE_ROTATION_EFFECTS
              value: {{ join "," .effects | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.authority.controlAuth }}
            {{- if .existingSecret }}
            - name: AMBIENCE_CONTROL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret | quote }}
                  key: {{ .passwordKey | quote }}
            {{- end }}
            {{- with .microsoft }}
            {{- if .enabled }}
            - name: AMBIENCE_MICROSOFT_TENANT
              value: {{ $.Values.oauth.microsoft.tenant | quote }}
            - name: AMBIENCE_MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret | quote }}
                  key: {{ .clientIdKey | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: {{ .Values.authority.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.authority.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.authority.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: {{ .Values.authority.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.authority.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.authority.probes.liveness.failureThreshold }}
          resources:
            {{- toYaml .Values.authority.resources | nindent 12 }}
          {{- if and .Values.testEnv.enabled .Values.authority.hotSwapBackend.enabled }}
          volumeMounts:
            - name: hot-backend
              mountPath: {{ .Values.authority.hotSwapBackend.mountPath | quote }}
          {{- end }}
        {{- if and .Values.testEnv.enabled .Values.authority.hotSwapBackend.enabled }}
        - name: {{ .Values.authority.hotSwapBackend.writerContainerName }}
          image: {{ .Values.authority.hotSwapBackend.writerImage | quote }}
          imagePullPolicy: {{ .Values.authority.hotSwapBackend.writerImagePullPolicy }}
          command:
            - sh
            - -c
            - |
              mkdir -p {{ .Values.authority.hotSwapBackend.mountPath | quote }}
              while true; do sleep 3600; done
          volumeMounts:
            - name: hot-backend
              mountPath: {{ .Values.authority.hotSwapBackend.mountPath | quote }}
        {{- end }}
      {{- if and .Values.testEnv.enabled .Values.authority.hotSwapBackend.enabled }}
      volumes:
        - name: hot-backend
          emptyDir: {}
      {{- end }}
{{- end }}
