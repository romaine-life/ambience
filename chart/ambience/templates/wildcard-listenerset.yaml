{{- if .Values.wildcardCertificate.enabled }}
{{- /*
One XListenerSet that attaches both a wildcard listener and a base-host
listener (TLS wildcards only match a single label, so the bare
ambience.dev.romaine.life needs its own listener entry). Both listeners
terminate with the same wildcard cert (multi-SAN). HTTPRoutes from any
namespace can attach (allowedRoutes.namespaces.from=All) so per-issue and
per-PR ephemeral envs don't need a ReferenceGrant.
*/}}
apiVersion: gateway.networking.x-k8s.io/v1alpha1
kind: XListenerSet
metadata:
  name: {{ .Values.wildcardCertificate.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ambience.labels" . | nindent 4 }}
spec:
  parentRef:
    group: {{ .Values.gateway.parentGateway.group }}
    kind: {{ .Values.gateway.parentGateway.kind }}
    name: {{ .Values.gateway.parentGateway.name }}
    namespace: {{ .Values.gateway.parentGateway.namespace }}
  listeners:
    {{- range $i, $host := .Values.wildcardCertificate.hosts }}
    - name: {{ printf "https-%d" $i }}
      protocol: HTTPS
      port: 443
      hostname: {{ $host | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: {{ $.Values.wildcardCertificate.tlsSecretName }}
      allowedRoutes:
        namespaces:
          from: {{ $.Values.wildcardCertificate.allowedFromNamespaces }}
    {{- end }}
{{- end }}
