# TLS certificate for ambience.romaine.life via Let's Encrypt.
# cert-manager issues using HTTP-01 challenge via the shared Gateway's HTTP listener.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ambience-tls
  namespace: ambience
spec:
  secretName: ambience-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - ambience.romaine.life
