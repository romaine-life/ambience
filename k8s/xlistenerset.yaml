# ambience's HTTPS listener. Attaches cross-namespace to the shared `main`
# Gateway in envoy-gateway-system. Same pattern as argocd and other apps —
# each app owns its own listener in its own namespace.
apiVersion: gateway.networking.x-k8s.io/v1alpha1
kind: XListenerSet
metadata:
  name: ambience
  namespace: ambience
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: main
    namespace: envoy-gateway-system
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: ambience.romaine.life
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: ambience-tls
