apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Image tag is bumped by .github/workflows/build-and-deploy.yml after each
# image push. ArgoCD reconciles when the committed tag changes.
images:
- name: romainecr.azurecr.io/ambience
  newName: romainecr.azurecr.io/ambience
  newTag: 41c7265

resources:
- certificate.yaml
- authority-service.yaml
- deployment.yaml
- edge-deployment.yaml
- httproute.yaml
- poddisruptionbudgets.yaml
- pvc.yaml
- service.yaml
- xlistenerset.yaml
