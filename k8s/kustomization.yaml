apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Image tag is updated manually from the session after a manual image build.
# ArgoCD reconciles when the committed tag changes.
images:
- name: romainecr.azurecr.io/ambience
  newName: romainecr.azurecr.io/ambience
  newTag: 700c1d0

resources:
- certificate.yaml
- authority-service.yaml
- authority-client-service.yaml
- deployment.yaml
- edge-deployment.yaml
- httproute.yaml
- poddisruptionbudgets.yaml
- pvc.yaml
- service.yaml
- xlistenerset.yaml
