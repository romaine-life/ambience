# Routes ambience.romaine.life to the ambience Service.
# ExternalDNS creates the DNS record from this resource.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ambience
  namespace: ambience
spec:
  hostnames:
    - ambience.romaine.life
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: ambience
          port: 80
          weight: 1
