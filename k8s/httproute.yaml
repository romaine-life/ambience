# Routes ambience.romaine.life to the ambience Service.
# Dual parentRefs:
#   - Gateway main (platform HTTP listener on 80 — ExternalDNS reads this
#     to create the A record; external-dns#5694 tracks following XListenerSet)
#   - XListenerSet ambience (HTTPS on 443 with cert)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ambience
  namespace: ambience
spec:
  hostnames:
    - ambience.romaine.life
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: ambience
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: 0s
        backendRequest: 0s
      backendRefs:
        - group: ""
          kind: Service
          name: ambience
          port: 80
          weight: 1
