# Allows the shared Gateway in envoy-gateway-system to reference the
# ambience-tls Secret in this namespace for TLS termination.
# Gateway API requires explicit cross-namespace permission.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gateway-tls
  namespace: ambience
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: envoy-gateway-system
  to:
    - group: ""
      kind: Secret
