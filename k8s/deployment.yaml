apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambience
  namespace: ambience
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ambience
  template:
    metadata:
      labels:
        app: ambience
    spec:
      containers:
        - name: ambience
          image: romainecr.azurecr.io/ambience:latest
          imagePullPolicy: Always
          env:
            - name: AMBIENCE_PERSIST_PATH
              value: /data/shared-atmosphere.json
            - name: AMBIENCE_PERSIST_INTERVAL
              value: 30s
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: ambience-state
              mountPath: /data
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: ambience-state
          persistentVolumeClaim:
            claimName: ambience-state
