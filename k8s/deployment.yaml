apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ambience-authority
  namespace: ambience
spec:
  serviceName: ambience-authority
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: ambience
      component: authority
  template:
    metadata:
      labels:
        app: ambience
        component: authority
    spec:
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: ambience
          image: romainecr.azurecr.io/ambience:latest
          imagePullPolicy: Always
          env:
            - name: AMBIENCE_ROLE
              value: authority
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
