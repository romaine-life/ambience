<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ambience — dev</title>
<style>
	html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; overflow: hidden; color: #e0e0e0; font-family: monospace; }
	#c { position: absolute; inset: 0; width: 100vw; height: 100vh; image-rendering: pixelated; }
	#panel {
		position: absolute; top: 10px; right: 10px; z-index: 10;
		background: rgba(0,0,0,0.78); padding: 10px 14px;
		border: 1px solid #333; border-radius: 4px;
		font-size: 11px; width: 300px; max-width: 300px;
		max-height: calc(100vh - 20px); overflow-y: auto;
	}
	#panel.collapsed .body { display: none; }
	#panel.collapsed { width: auto; }
	#panel h1 {
		font-size: 11px; margin: 0 0 8px 0; opacity: 0.6;
		text-transform: uppercase; letter-spacing: 1.2px;
		display: flex; justify-content: space-between; align-items: center;
	}
	#panel h2 {
		font-size: 10px; margin: 12px 0 4px 0; opacity: 0.65;
		text-transform: uppercase; letter-spacing: 1px;
		border-bottom: 1px solid #2a2a2a; padding-bottom: 2px;
	}
	#panel h3 {
		font-size: 9px; margin: 6px 0 2px 0; opacity: 0.4;
		text-transform: uppercase; letter-spacing: 1px; font-weight: normal;
	}
	.empty-slot { opacity: 0.3; font-size: 10px; margin: 2px 0 6px 0; font-style: italic; }
	#toggle {
		background: none; border: 1px solid #333; color: #e0e0e0;
		font-family: monospace; font-size: 10px; padding: 0 6px;
		cursor: pointer; border-radius: 2px;
	}
	.row { display: flex; align-items: center; margin: 3px 0; gap: 6px; }
	.row label { opacity: 0.75; min-width: 70px; font-size: 10px; }
	.row input[type=range] { flex: 1; min-width: 50px; }
	.row .val { opacity: 0.6; min-width: 38px; text-align: right; font-variant-numeric: tabular-nums; font-size: 10px; }
	.help {
		display: inline-flex; align-items: center; justify-content: center;
		width: 13px; height: 13px; min-width: 13px;
		border: 1px solid #555; border-radius: 50%;
		font-size: 8px; line-height: 1; color: #888;
		cursor: help; flex-shrink: 0; user-select: none;
	}
	.help:hover { border-color: #aaa; color: #e0e0e0; background: #1a1a1a; }
	.fire {
		background: #2a2a2a; border: 1px solid #555; color: #e0e0e0;
		font-family: monospace; font-size: 9px; padding: 1px 5px;
		cursor: pointer; border-radius: 2px; text-transform: uppercase;
		letter-spacing: 0.5px; flex-shrink: 0;
	}
	.fire:hover { background: #3a3a3a; border-color: #888; }
	.fire:active { background: #555; }
	#log {
		margin-top: 12px; border-top: 1px solid #2a2a2a; padding-top: 8px;
	}
	#log h2 { margin-top: 0; display: flex; justify-content: space-between; }
	#log .entries {
		font-size: 9px; max-height: 120px; overflow-y: auto;
		background: #060606; border: 1px solid #1a1a1a; padding: 4px 6px;
		opacity: 0.85;
	}
	#log .entry { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
	#log .entry .t { opacity: 0.5; margin-right: 4px; }
	#log .entry .k { opacity: 0.9; margin-right: 4px; font-weight: bold; }
	#log .entry.downpour .k { color: #9cdcfe; }
	#log .entry.calm .k { color: #ce9178; }
	#log .entry.gust .k { color: #dcdcaa; }
	#log .entry.splash .k { color: #c586c0; }
	#logClear {
		background: none; border: 1px solid #333; color: #888;
		font-family: monospace; font-size: 9px; padding: 0 4px;
		cursor: pointer; border-radius: 2px;
	}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="panel">
	<h1><span id="title">ambience dev</span><button id="toggle" title="collapse / expand (h)">–</button></h1>
	<div class="body" id="body"></div>
</div>
<script src="/ambience.js"></script>
<script>
	// Portable schema-driven dev panel.
	// Per-session sim: the server keeps our sim alive across URL-param
	// reconnects, so tweaking a knob updates the running world instead of
	// resetting it. Event knobs also get a "fire" button that POSTs to
	// /dev/trigger. Log panel shows event occurrences.

	const SLOT_LABELS = {
		'spawn':     'spawn config',
		'lever':     'continuous levers',
		'event':     'discrete events',
		'event-mod': 'event modifiers',
		'end':       'end conditions',
	};
	const SLOT_ORDER = ['spawn', 'lever', 'event', 'event-mod', 'end'];

	// Stable session ID so every URL-param change reuses the same server-side sim.
	const SESSION_ID = (crypto.randomUUID ? crypto.randomUUID() :
		Math.random().toString(36).slice(2) + Date.now().toString(36));

	const canvas = document.getElementById('c');
	const body = document.getElementById('body');
	const title = document.getElementById('title');
	let amb = null;
	let knobs = [];

	function fmt(knob, v) {
		if (knob.type === 'int') return String(Math.round(v));
		const d = (knob.step < 0.1) ? 2 : (knob.step < 1 ? 1 : 0);
		return v.toFixed(d) + (knob.key === 'hue' || knob.key === 'hue_sp' ? '°' : '');
	}

	function valOf(key) { return +document.getElementById(key).value; }

	function updateReadouts() {
		for (const k of knobs) {
			document.getElementById(k.key + '_v').textContent = fmt(k, valOf(k.key));
		}
	}

	function currentQuery() {
		const q = new URLSearchParams();
		q.set('session', SESSION_ID);
		for (const k of knobs) {
			const v = valOf(k.key);
			q.set(k.key, k.type === 'int' ? String(Math.round(v)) : v.toString());
		}
		return q.toString();
	}

	function reconnect() {
		if (amb) amb.close();
		amb = new Ambience({ canvas, stream: '/dev/stream?' + currentQuery() });
		// Our Ambience renderer only knows about grid pixels; intercept SSE
		// messages here too so we can pick log entries out of the same frame.
		patchAmbForLog(amb);
	}

	// Monkey-patch: listen to the EventSource that Ambience opened and extract
	// log entries from each frame. Grid rendering still happens inside Ambience.
	function patchAmbForLog(amb) {
		if (!amb || !amb.es) return;
		amb.es.addEventListener('message', (e) => {
			try {
				const f = JSON.parse(e.data);
				if (f.log && f.log.length) appendLog(f.log);
			} catch (_) {}
		});
	}

	let debounceT = null;
	function schedule() {
		updateReadouts();
		if (debounceT) clearTimeout(debounceT);
		debounceT = setTimeout(reconnect, 150);
	}

	async function fire(eventName) {
		await fetch('/dev/trigger/' + encodeURIComponent(SESSION_ID) + '/' + encodeURIComponent(eventName), { method: 'POST' });
	}

	function buildRow(knob) {
		const row = document.createElement('div');
		row.className = 'row';
		const label = document.createElement('label');
		label.textContent = knob.label;
		const input = document.createElement('input');
		input.type = 'range';
		input.id = knob.key;
		input.min = knob.min;
		input.max = knob.max;
		input.step = knob.step;
		input.value = knob.default;
		const val = document.createElement('span');
		val.className = 'val';
		val.id = knob.key + '_v';
		row.append(label, input, val);
		if (knob.trigger) {
			const btn = document.createElement('button');
			btn.className = 'fire';
			btn.textContent = 'fire';
			btn.title = 'trigger this event now';
			btn.addEventListener('click', () => fire(knob.trigger));
			row.append(btn);
		}
		if (knob.description) {
			const help = document.createElement('span');
			help.className = 'help';
			help.textContent = '?';
			help.title = knob.description;
			row.append(help);
		}
		return row;
	}

	function renderPanel(schema) {
		title.textContent = 'ambience dev — ' + schema.name;
		body.innerHTML = '';
		knobs = schema.knobs;

		const bySlot = {};
		for (const k of knobs) (bySlot[k.slot] ||= {})[k.group || ''] ??= [], (bySlot[k.slot][k.group || ''] ||= []).push(k);

		for (const slot of SLOT_ORDER) {
			const h2 = document.createElement('h2');
			h2.textContent = SLOT_LABELS[slot] || slot;
			body.appendChild(h2);

			if (!bySlot[slot]) {
				const empty = document.createElement('div');
				empty.className = 'empty-slot';
				empty.textContent = 'none yet';
				body.appendChild(empty);
				continue;
			}

			const groups = bySlot[slot];
			const groupNames = Object.keys(groups);
			const showSubHeaders = !(groupNames.length === 1 && groupNames[0] === '');
			for (const g of groupNames) {
				if (showSubHeaders && g) {
					const h3 = document.createElement('h3');
					h3.textContent = g;
					body.appendChild(h3);
				}
				for (const k of groups[g]) body.appendChild(buildRow(k));
			}
		}

		// Log panel.
		const logDiv = document.createElement('div');
		logDiv.id = 'log';
		logDiv.innerHTML = '<h2><span>event log</span><button id="logClear">clear</button></h2><div class="entries" id="logEntries"></div>';
		body.appendChild(logDiv);
		document.getElementById('logClear').addEventListener('click', () => {
			document.getElementById('logEntries').innerHTML = '';
		});

		for (const k of knobs) {
			document.getElementById(k.key).addEventListener('input', schedule);
		}
	}

	function appendLog(entries) {
		const box = document.getElementById('logEntries');
		if (!box) return;
		for (const e of entries) {
			const row = document.createElement('div');
			row.className = 'entry ' + e.type;
			row.innerHTML = '<span class="t">t=' + e.tick + '</span><span class="k">' + e.type + '</span><span class="d">' + e.desc + '</span>';
			box.appendChild(row);
		}
		// Trim to last 100 entries, scroll to bottom.
		while (box.children.length > 100) box.removeChild(box.firstChild);
		box.scrollTop = box.scrollHeight;
	}

	// Collapse toggle
	const panel = document.getElementById('panel');
	const toggle = document.getElementById('toggle');
	function setCollapsed(on) {
		panel.classList.toggle('collapsed', on);
		toggle.textContent = on ? '+' : '–';
	}
	toggle.addEventListener('click', () => setCollapsed(!panel.classList.contains('collapsed')));
	window.addEventListener('keydown', (e) => {
		if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
		if (e.key === 'h') setCollapsed(!panel.classList.contains('collapsed'));
	});

	// Boot
	fetch('/effects/rain/schema')
		.then(r => r.json())
		.then(schema => {
			renderPanel(schema);
			updateReadouts();
			reconnect();
		})
		.catch(err => console.error('failed to load schema', err));
</script>
</body>
</html>
