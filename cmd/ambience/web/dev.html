<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ambience — dev</title>
<meta name="description" content="Tune ambience effect controls in an isolated browser session.">
<!-- __AMBIENCE_SOCIAL_META__ -->
<link rel="stylesheet" href="/chrome.css">
<style>
	/* Page frame only — all chrome lives in /chrome.css ("Exposed" skin). */
	html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; overflow: hidden;
		color: var(--fg-body); font-family: var(--font-primary); }
	#c { position: absolute; inset: 0; width: 100vw; height: 100vh; image-rendering: pixelated; }
	/* dev exposes the whole effect library, so its track scrolls horizontally. */
	#d5Trk { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 2px; }
	#d5Trk::-webkit-scrollbar { height: 4px; }
	#d5Trk::-webkit-scrollbar-thumb { background: var(--gray-800); border-radius: 2px; }
</style>
</head>
<body>
<canvas id="c" class="worldview"></canvas>
<div class="chrome" id="chrome"></div>
<!-- minimal "esc →" summon affordance; content + mouse-reveal behavior owned by chrome.js -->
<div class="summon" id="summonHint" style="display:none"></div>

<script src="/sim.js"></script>
<script src="/wasm_runtime.js"></script>
<script src="/chrome.js"></script>
<script>
	// ── ambience dev console ──────────────────────────────────────────────
	// Runs a local effect sim, drives a per-session atmosphere on the server
	// via POST /dev/config and /dev/trigger; state returns over SSE. All
	// presentation is the shared "Exposed" chrome (window.AmbienceChrome).
	'use strict';
	(function () {

	const URL_PARAMS = new URLSearchParams(window.location.search);
	function intParam(name, fallback, min, max) {
		const n = parseInt(URL_PARAMS.get(name) || '', 10);
		if (!Number.isFinite(n)) return fallback;
		return Math.max(min, Math.min(max, n));
	}
	const GRID_W = intParam('gridW', 160, 32, 640);
	const GRID_H = intParam('gridH', 80, 24, 360);
	const FPS = intParam('fps', 10, 1, 60);
	const STEP_MS = Math.max(1, Math.round(1000 / FPS));
	// Honor a caller-supplied session id from the URL so an external driver
	// (the glimmung verifier, selfcheck-effect.sh) can address the SAME dev
	// session it renders. POSTing /dev/trigger/<session>/<event> only affects
	// this page when both sides agree on the id; without this, the page picked
	// a private random id and every external trigger hit an orphan session.
	// Fall back to a generated id for normal interactive use. Contract:
	// dev-endpoints.md ("session is a query param the page assigns").
	const SESSION_ID = URL_PARAMS.get('session') ||
		(crypto.randomUUID ? crypto.randomUUID() :
		Math.random().toString(36).slice(2) + Date.now().toString(36));
	const SESSION_SHORT = SESSION_ID.replace(/-/g, '').slice(0, 8);

	const canvas = document.getElementById('c');
	const ctx = canvas.getContext('2d');
	const L = window.AmbienceChrome.effectLabel;

	let effect = effectFromLocation();
	let sim = null;
	let currentSimType = effect;
	let ready = false;
	let streamSeq = 0;
	let latestConfig = null;
	let es = null;
	let initialQueryConfigApplied = false;

	function effectFromLocation() {
		const parts = window.location.pathname.split('/').filter(Boolean);
		if (parts.length >= 2 && parts[0] === 'dev') return parts[1];
		return URL_PARAMS.get('effect') || 'rain';
	}
	function newEffectInstance(name) {
		const ctor = AmbienceSim.effects[name];
		if (!ctor) throw new Error('unknown effect: ' + name);
		return new ctor(GRID_W, GRID_H, {});
	}
	function availableEffects() {
		return Object.keys(AmbienceSim.effects || {}).sort((a, b) => a.localeCompare(b));
	}
	function effectPath(name) {
		const q = new URLSearchParams();
		if (GRID_W !== 160) q.set('gridW', String(GRID_W));
		if (GRID_H !== 80) q.set('gridH', String(GRID_H));
		if (FPS !== 10) q.set('fps', String(FPS));
		const suffix = q.toString();
		return '/dev/' + encodeURIComponent(name) + (suffix ? '?' + suffix : '');
	}

	function resize() {
		const dpr = window.devicePixelRatio || 1;
		canvas.width = window.innerWidth * dpr;
		canvas.height = window.innerHeight * dpr;
	}
	resize();
	window.addEventListener('resize', resize);

	// ── chrome controller ──────────────────────────────────────────────────
	const chrome = window.AmbienceChrome.mount({
		host: document.getElementById('chrome'),
		hint: document.getElementById('summonHint'),
		canvas, mode: 'dev', gridW: GRID_W, gridH: GRID_H, effect, summoned: true,
		line: 'isolated dev session · tune the effect freely; nothing here touches the live broadcast.',
		routeJump: { label: '← live', title: 'open the live broadcast monitor', onClick: () => { window.location.href = '/'; } },
		ctl: { title: 'control surface', modeLabel: 'dev · open', note: 'open sandbox — tinker freely; nothing here broadcasts.', showRandomize: true },
		feedLabel: 'effects',
		tele: {
			header: 'session clock', badge: { tone: 'muted', label: 'local' },
			rows: [
				{ k: 'sim.tick', v: '0' }, { k: 'effect', v: L(effect) }, { k: 'grid', v: GRID_W + ' × ' + GRID_H },
				{ k: 'fps', v: String(FPS) }, { k: 'session', v: SESSION_SHORT }, { k: 'effects', v: '—' },
			],
			footer: { tone: 'muted', html: 'isolated dev session · changes stay local' },
		},
		handlers: {
			onKnob: () => schedule(),
			onFire: (eventName) => fire(eventName),
			onPreset: (val, cfg) => { chrome.setValues(cfg); schedule(); },
			onRandomize: () => randomizeCurrentEffect(),
		},
	});

	// ── server IO (data layer) ─────────────────────────────────────────────
	function configQuery(values) {
		const q = new URLSearchParams();
		q.set('session', SESSION_ID);
		q.set('effect', effect);
		q.set('gridW', String(GRID_W));
		q.set('gridH', String(GRID_H));
		if (values) {
			for (const key of Object.keys(values)) {
				const v = values[key];
				if (v == null) continue;
				q.set(key, String(v));
			}
		} else {
			const vals = chrome.currentValues();
			for (const k of chrome.getKnobs()) {
				const v = vals[k.key];
				if (v == null) continue;
				q.set(k.key, k.type === 'int' ? String(Math.round(v)) : String(v));
			}
		}
		return q.toString();
	}
	function currentQuery() { return configQuery(null); }
	function initialQueryConfig(baseConfig) {
		if (!baseConfig) return null;
		const cfg = Object.assign({}, baseConfig);
		let changed = false;
		for (const key of Object.keys(baseConfig)) {
			if (!URL_PARAMS.has(key)) continue;
			const n = parseFloat(URL_PARAMS.get(key) || '');
			if (!Number.isFinite(n)) continue;
			cfg[key] = n;
			changed = true;
		}
		return changed ? cfg : null;
	}
	let debounceT = null;
	function schedule() {
		if (debounceT) clearTimeout(debounceT);
		debounceT = setTimeout(pushConfig, 150);
	}
	async function pushConfig() {
		try { await fetch('/dev/config?' + currentQuery(), { method: 'POST' }); }
		catch (e) { console.error('config push', e); }
	}
	async function pushConfigValues(values) {
		try { await fetch('/dev/config?' + configQuery(values), { method: 'POST' }); }
		catch (e) { console.error('config push', e); }
	}
	async function fire(eventName) {
		try {
			await fetch('/dev/trigger/' + encodeURIComponent(SESSION_ID) + '/' + encodeURIComponent(eventName) +
				'?effect=' + encodeURIComponent(effect) +
				'&gridW=' + encodeURIComponent(String(GRID_W)) +
				'&gridH=' + encodeURIComponent(String(GRID_H)), { method: 'POST' });
		} catch (e) { console.error('trigger', e); }
	}
	async function randomizeCurrentEffect() {
		const btn = document.getElementById('d5RandomizeBtn');
		if (btn) btn.disabled = true;
		try {
			const resp = await fetch('/dev/randomize?session=' + encodeURIComponent(SESSION_ID) +
				'&effect=' + encodeURIComponent(effect) +
				'&gridW=' + encodeURIComponent(String(GRID_W)) +
				'&gridH=' + encodeURIComponent(String(GRID_H)), { method: 'POST' });
			if (!resp.ok) throw new Error('randomize failed: ' + resp.status);
			const cfg = await resp.json();
			if (sim) sim.setConfig(cfg);
			latestConfig = cfg;
			chrome.setValues(cfg);
			chrome.appendLog({ t: 't=' + (sim ? sim.tick : 0), kind: 'entropy', text: 'randomize · ' + effect });
		} catch (e) { console.error('randomize', e); }
		finally { if (btn) btn.disabled = false; }
	}

	function setScene() {
		chrome.setScene(effect);
		chrome.setTele('effect', L(effect));
	}
	function renderTrack() {
		chrome.renderTrack(availableEffects().map((name) => ({
			label: L(name), now: name === effect,
			title: name === effect ? 'current effect' : 'switch to ' + L(name),
			onClick: name === effect ? null : () => softSwitchEffect(name),
		})));
	}

	// ── local loops + SSE ──────────────────────────────────────────────────
	function startLoops() {
		setInterval(() => {
			if (!ready || !sim) return;
			sim.step();
			chrome.setTele('sim.tick', (sim.tick || 0).toLocaleString());
			if (sim.isTransition && sim.done()) {
				if (sim.outgoing && typeof sim.outgoing.destroy === 'function') sim.outgoing.destroy();
				sim = sim.incoming;
			}
		}, STEP_MS);
		(function draw() {
			if (sim) sim.render(ctx, canvas.width, canvas.height);
			requestAnimationFrame(draw);
		})();
	}

	function handleDevCommand(cmd, streamID, expectedEffect) {
		if (streamID !== streamSeq) return;
		switch (cmd.kind) {
			case 'snapshot':
				try {
					const snap = typeof cmd.data === 'string' ? JSON.parse(cmd.data) : cmd.data;
					const snapType = (snap && snap.type) || currentSimType;
					if (snapType !== expectedEffect) return;
					if (snapType !== currentSimType) {
						const incoming = newEffectInstance(snapType);
						try { incoming.restoreSnapshot(snap); } catch (err) { console.error('bad snapshot', err); }
						sim = sim && AmbienceSim.EffectTransition ? new AmbienceSim.EffectTransition(sim, incoming) : incoming;
						currentSimType = snapType;
						effect = snapType;
						loadSchema(effect);
						setScene();
						renderTrack();
						chrome.appendLog({ t: 't=' + cmd.tick, kind: 'scene', text: 'effect → ' + snapType });
					} else {
						if (!sim) sim = newEffectInstance(snapType);
						sim.restoreSnapshot(snap);
					}
					ready = true;
					latestConfig = snap.config || latestConfig;
					if (snap.config) chrome.setValues(snap.config);
					if (!initialQueryConfigApplied && snap.config) {
						initialQueryConfigApplied = true;
						const cfg = initialQueryConfig(snap.config);
						if (cfg) {
							latestConfig = cfg;
							chrome.setValues(cfg);
							if (sim) sim.setConfig(cfg);
							pushConfigValues(cfg);
						}
					}
				} catch (err) { console.error('bad snapshot', err); }
				break;
			case 'config':
				if (expectedEffect !== effect || !sim) break;
				try {
					const cfg = typeof cmd.data === 'string' ? JSON.parse(cmd.data) : cmd.data;
					sim.setConfig(cfg);
					latestConfig = cfg;
					chrome.setValues(cfg);
				} catch (err) { console.error('bad config', err); }
				break;
			case 'trigger':
				if (expectedEffect !== effect) break;
				if (sim && sim.triggerEvent) sim.triggerEvent(cmd.event);
				chrome.appendLog({ t: 't=' + cmd.tick, kind: 'trigger', text: cmd.event + (cmd.desc ? ' · ' + cmd.desc : '') });
				break;
		}
	}
	function openDevStream(effectName) {
		const streamID = ++streamSeq;
		const stream = new EventSource('/dev/events?session=' + encodeURIComponent(SESSION_ID) +
			'&effect=' + encodeURIComponent(effectName) +
			'&gridW=' + encodeURIComponent(String(GRID_W)) +
			'&gridH=' + encodeURIComponent(String(GRID_H)));
		stream.addEventListener('message', (e) => {
			let cmd; try { cmd = JSON.parse(e.data); } catch (_) { return; }
			handleDevCommand(cmd, streamID, effectName);
		});
		return stream;
	}
	function softSwitchEffect(next) {
		if (!next || next === effect) return;
		effect = next;
		history.replaceState(null, '', effectPath(next));
		setScene();
		renderTrack();
		if (es) es.close();
		es = openDevStream(next);
	}
	function loadSchema(effectName) {
		fetch('/effects/' + encodeURIComponent(effectName) + '/schema')
			.then(r => r.json())
			.then(schema => { chrome.renderControls(schema); if (latestConfig) chrome.setValues(latestConfig); })
			.catch(err => console.error('schema', err));
	}

	async function startDevRuntime() {
		await AmbienceSim.wasm.ready();
		setScene();
		renderTrack();
		chrome.setTele('effects', String(availableEffects().length));
		loadSchema(effect);
		startLoops();
		es = openDevStream(effect);
	}
	startDevRuntime().catch((err) => {
		console.error(err);
		chrome.setLine('wasm runtime failed — ' + err.message);
	});
	})();
</script>
</body>
</html>
