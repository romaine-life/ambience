<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ambience</title>
<style>
	html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; overflow: hidden; }
	canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="/sim.js"></script>
<script>
	// Canonical demo. Runs a local Rain sim, subscribes to the shared
	// atmosphere's command stream, and renders to canvas.
	const canvas = document.getElementById('c');
	const ctx = canvas.getContext('2d');

	function resize() {
		const dpr = window.devicePixelRatio || 1;
		canvas.width = window.innerWidth * dpr;
		canvas.height = window.innerHeight * dpr;
	}
	resize();
	window.addEventListener('resize', resize);

	// Grid dimensions must match the server's (cmd/ambience/main.go gridW/gridH).
	const GRID_W = 160, GRID_H = 80;
	const rain = new AmbienceSim.Rain(GRID_W, GRID_H, {});

	let ready = false;
	AmbienceSim.subscribe('/events', rain, () => { ready = true; });

	// Local tick loop at 10 Hz (server tick rate).
	setInterval(() => { if (ready) rain.step(); }, 100);
	// Render every animation frame.
	(function draw() {
		rain.render(ctx, canvas.width, canvas.height);
		requestAnimationFrame(draw);
	})();
</script>
</body>
</html>
