<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ambience - live</title>
<meta name="description" content="A shared ambient pixel simulation for browser and terminal surfaces.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ambience">
<meta property="og:title" content="ambience - live">
<meta property="og:description" content="A shared ambient pixel simulation for browser and terminal surfaces.">
<meta property="og:url" content="https://ambience.romaine.life/">
<meta property="og:image" content="__AMBIENCE_OG_IMAGE__">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:type" content="image/png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="ambience - live">
<meta name="twitter:description" content="A shared ambient pixel simulation for browser and terminal surfaces.">
<meta name="twitter:image" content="__AMBIENCE_OG_IMAGE__">
<link rel="stylesheet" href="/chrome.css">
<style>
	/* Page frame only — all chrome lives in /chrome.css ("Exposed" skin). */
	html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; overflow: hidden;
		color: var(--fg-body); font-family: var(--font-primary); }
	#c { position: fixed; inset: 0; z-index: 0; width: 100vw; height: 100vh; image-rendering: pixelated; display: block; }
	/* page-load fade: the world rises out of black */
	#pageload { position: fixed; inset: 0; z-index: 30; background: #0a0a0a; pointer-events: none; animation: pageFade 1.2s ease forwards; }
	@keyframes pageFade { to { opacity: 0; } }
	@media (prefers-reduced-motion: reduce) { #pageload { display: none; } }
</style>
</head>
<body>
<canvas id="c" class="worldview"></canvas>
<div class="chrome" id="chrome"></div>
<div class="summon" id="summonHint" style="display:none">
	<span class="summon__kbd">esc</span>
	<span>reveal the broadcast monitor</span>
	<span class="summon__route">live</span>
</div>
<div id="pageload"></div>

<script src="/sim.js"></script>
<script src="/wasm_runtime.js"></script>
<script src="/chrome.js"></script>
<script>
(() => {
	// ── ambience live broadcast monitor ──────────────────────────────────
	// Subscribes to the shared atmosphere over /events and renders it under the
	// "Exposed" chrome. Controls mirror the live world; mutations are admin-gated
	// (/control-auth) and stay read-only until an admin signs in and arms them.
	'use strict';

	const GRID_W = 160, GRID_H = 80;
	const L = window.AmbienceChrome.effectLabel;
	const canvas = document.getElementById('c');
	const ctx = canvas.getContext('2d');

	function resize() {
		const dpr = window.devicePixelRatio || 1;
		canvas.width = Math.floor(window.innerWidth * dpr);
		canvas.height = Math.floor(window.innerHeight * dpr);
	}
	resize();
	window.addEventListener('resize', resize);

	function newEffectInstance(name) {
		const ctor = AmbienceSim.effects[name];
		if (!ctor) throw new Error('unknown effect: ' + name);
		return new ctor(GRID_W, GRID_H, {});
	}

	// world / scene state
	let effectType = null, effect = null, latestConfig = null, ready = false;
	let serverTick = 0, lastBeatAt = Date.now(), sceneStartTick = 0, sceneDurationTicks = 0;
	let currentSceneName = '—', nextSceneName = '—', entropyBytes = 0;
	let connState = 'acquiring';

	// auth state
	let authRequired = true, authed = false, armed = false;
	let authProvider = '', microsoftTenant = '', microsoftClientId = '';

	// ── chrome controller ──────────────────────────────────────────────────
	const chrome = window.AmbienceChrome.mount({
		host: document.getElementById('chrome'),
		hint: document.getElementById('summonHint'),
		canvas, mode: 'live', gridW: GRID_W, gridH: GRID_H, summoned: false, locked: true,
		line: 'the live broadcast — every screen in step. controls mirror the world; intervening is admin-gated.',
		routeJump: { label: 'dev →', title: 'open the dev tuning sandbox', onClick: () => { window.location.href = '/dev'; } },
		ctl: { title: 'control surface', modeLabel: 'live · admin', note: '' },
		feedLabel: 'broadcast track', showAuth: true, showNext: true,
		tele: {
			header: 'authority clock', badge: { tone: 'muted', label: 'acquiring' },
			rows: [
				{ k: 'server.tick', v: '—' }, { k: 'scene', v: '—' }, { k: 'remaining', v: '—' },
				{ k: 'up.next', v: '—' }, { k: 'effect', v: '—' }, { k: 'grid', v: GRID_W + ' × ' + GRID_H }, { k: 'entropy', v: '0 B' },
			],
			footer: { tone: 'muted', html: 'acquiring authority…' },
		},
		handlers: {
			onKnob: () => scheduleSharedConfigPush(),
			onFire: (eventName) => triggerSharedEvent(eventName),
			onPreset: (val, cfg) => { chrome.setValues(cfg); scheduleSharedConfigPush(); },
			onNext: () => advanceSharedEffect(),
			onSignIn: () => signInControls(),
			onArm: () => { if (authed) { armed = !armed; setAuthUI(); } },
			onSignOut: () => signOutControls(),
		},
	});

	// ── formatting ───────────────────────────────────────────────────────
	function fmtDuration(ticks) {
		const secs = Math.max(0, Math.round(ticks / 10));
		const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60), s = secs % 60;
		if (h > 0) return h + 'h ' + String(m).padStart(2, '0') + 'm';
		if (m > 0) return m + 'm ' + String(s).padStart(2, '0') + 's';
		return s + 's';
	}
	function fmtBytes(n) {
		if (n < 1024) return n + ' B';
		if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
		return (n / 1024 / 1024).toFixed(2) + ' MB';
	}
	function tickNow() { return serverTick + Math.round((Date.now() - lastBeatAt) / 100); }
	function remainingTicks() { return Math.max(0, sceneStartTick + sceneDurationTicks - tickNow()); }

	// ── auth UI ────────────────────────────────────────────────────────────
	function authStateName() {
		if (authRequired && !authed) return 'readonly';
		if (authed && armed) return 'armed';
		return 'viewonly';
	}
	function setAuthUI() {
		const st = authStateName();
		chrome.setAuth(st, { signInLabel: authRequired ? 'sign in' : 'unlock' });
		const lockedNow = !(authed && armed);
		chrome.setControlsLocked(lockedNow);
		chrome.setNextEnabled(!lockedNow);
		chrome.refs.note.textContent = st === 'readonly'
			? 'protected broadcast — sign in as an admin to intervene'
			: st === 'armed'
				? 'intervening on the live world — every change broadcasts to all screens'
				: 'controls mirror the broadcast · arm live mutations to intervene';
		chrome.refs.note.classList.toggle('is-armed', st === 'armed');
	}

	async function refreshControlAuth() {
		try {
			const resp = await fetch('/control-auth', { credentials: 'same-origin' });
			if (!resp.ok) throw new Error('auth status ' + resp.status);
			const s = await resp.json();
			authRequired = !!s.required;
			authed = !authRequired || !!s.authenticated;
			authProvider = s.provider || '';
			microsoftTenant = s.microsoftTenant || '';
			microsoftClientId = s.microsoftClientId || '';
		} catch (err) {
			console.error('control auth', err);
			authRequired = true; authed = false;
		}
		if (!authed) armed = false;
		setAuthUI();
	}

	function microsoftAuthURL() {
		const state = crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random();
		const nonce = crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random();
		sessionStorage.setItem('ambience.microsoft.state', state);
		sessionStorage.setItem('ambience.microsoft.nonce', nonce);
		const q = new URLSearchParams({
			client_id: microsoftClientId, response_type: 'id_token', redirect_uri: window.location.origin + '/auth/callback',
			response_mode: 'fragment', scope: 'openid profile email', state, nonce,
		});
		return 'https://login.microsoftonline.com/' + encodeURIComponent(microsoftTenant) + '/oauth2/v2.0/authorize?' + q.toString();
	}
	async function completeMicrosoftSignIn(idToken, nonce) {
		const resp = await fetch('/control-auth', {
			method: 'POST', credentials: 'same-origin', headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ idToken, nonce }),
		});
		if (!resp.ok) throw new Error('auth ' + resp.status);
		const s = await resp.json();
		authRequired = !!s.required;
		authed = !authRequired || !!s.authenticated;
		chrome.appendLog({ t: now(), kind: 'scene', text: 'live controls signed in' });
		return authed;
	}
	async function handleMicrosoftCallback() {
		if (!window.location.hash || !window.location.hash.includes('id_token=')) return;
		const params = new URLSearchParams(window.location.hash.slice(1));
		const expState = sessionStorage.getItem('ambience.microsoft.state');
		const expNonce = sessionStorage.getItem('ambience.microsoft.nonce');
		sessionStorage.removeItem('ambience.microsoft.state');
		sessionStorage.removeItem('ambience.microsoft.nonce');
		history.replaceState(null, '', '/');
		if (!params.get('id_token') || !expState || !expNonce || params.get('state') !== expState) {
			chrome.appendLog({ t: now(), kind: 'trigger', text: 'live control sign-in failed' });
			return;
		}
		try {
			const ok = await completeMicrosoftSignIn(params.get('id_token'), expNonce);
			armed = ok; setAuthUI();
		} catch (err) {
			console.error('control auth', err); authed = false; setAuthUI();
		}
	}
	async function signInControls() {
		if (authProvider === 'microsoft' && microsoftTenant && microsoftClientId) {
			window.location.assign(microsoftAuthURL());
			return;
		}
		const password = window.prompt('live control password');
		if (!password) return;
		try {
			const resp = await fetch('/control-auth', {
				method: 'POST', credentials: 'same-origin', headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ password }),
			});
			if (!resp.ok) throw new Error('auth ' + resp.status);
			const s = await resp.json();
			authRequired = !!s.required;
			authed = !authRequired || !!s.authenticated;
			armed = authed;
			chrome.appendLog({ t: now(), kind: 'scene', text: 'live controls signed in' });
		} catch (err) {
			console.error('control auth', err); authed = false;
			chrome.appendLog({ t: now(), kind: 'trigger', text: 'live control sign-in failed' });
		}
		setAuthUI();
	}
	async function signOutControls() {
		try { await fetch('/control-auth', { method: 'DELETE', credentials: 'same-origin' }); }
		catch (err) { console.error('control auth sign out', err); }
		authed = false; armed = false;
		sessionStorage.removeItem('ambience.microsoft.state');
		sessionStorage.removeItem('ambience.microsoft.nonce');
		chrome.appendLog({ t: now(), kind: 'scene', text: 'live controls signed out' });
		setAuthUI();
	}

	// ── shared-atmosphere control IO ────────────────────────────────────────
	function currentSharedQuery() {
		if (!effectType) return '';
		const vals = chrome.currentValues();
		const q = new URLSearchParams();
		q.set('effect', effectType);
		for (const k of chrome.getKnobs()) {
			const v = vals[k.key];
			if (v == null) continue;
			q.set(k.key, k.type === 'int' ? String(Math.round(v)) : String(v));
		}
		return q.toString();
	}
	let debounceT = null;
	function scheduleSharedConfigPush() {
		if (chrome.isLocked()) return;
		if (debounceT) clearTimeout(debounceT);
		debounceT = setTimeout(pushSharedConfig, 150);
	}
	async function pushSharedConfig() {
		if (chrome.isLocked() || !chrome.getSchema() || !effectType) return;
		try {
			const resp = await fetch('/config?' + currentSharedQuery(), { method: 'POST', credentials: 'same-origin' });
			if (resp.status === 401) { authed = false; armed = false; setAuthUI(); }
			else if (!resp.ok) throw new Error('config ' + resp.status);
		} catch (err) { console.error('shared config push', err); }
	}
	async function triggerSharedEvent(eventName) {
		if (chrome.isLocked()) return;
		try {
			const resp = await fetch('/trigger/' + encodeURIComponent(eventName) + '?effect=' + encodeURIComponent(effectType), { method: 'POST', credentials: 'same-origin' });
			if (resp.status === 401) { authed = false; armed = false; setAuthUI(); }
			else if (!resp.ok) throw new Error('trigger ' + resp.status);
		} catch (err) { console.error('shared trigger', err); }
	}
	async function advanceSharedEffect() {
		if (chrome.isLocked()) return;
		chrome.setNextEnabled(false);
		try {
			const resp = await fetch('/next-effect', { method: 'POST', credentials: 'same-origin' });
			if (resp.status === 401) { authed = false; armed = false; setAuthUI(); }
			else if (!resp.ok) throw new Error('next-effect ' + resp.status);
			else chrome.appendLog({ t: now(), kind: 'scene', text: 'requested next effect' });
		} catch (err) { console.error('next effect', err); }
		finally { if (!chrome.isLocked()) chrome.setNextEnabled(true); }
	}

	function loadSchema(effectName) {
		fetch('/effects/' + encodeURIComponent(effectName) + '/schema')
			.then(r => r.json())
			.then(schema => { chrome.renderControls(schema); chrome.setControlsLocked(!(authed && armed)); if (latestConfig) chrome.setValues(latestConfig); })
			.catch(err => { console.error('schema', err); });
	}

	// ── scene / track / telemetry ───────────────────────────────────────────
	function setScene(name) { effectType = name; chrome.setScene(name); chrome.setTele('effect', L(name)); renderLiveTrack(); }
	function renderLiveTrack() {
		const items = [{ label: L(effectType || '—'), now: true, dur: fmtDuration(remainingTicks()) }];
		if (nextSceneName && nextSceneName !== '—') items.push({ label: L(nextSceneName), now: false, title: 'up next' });
		chrome.renderTrack(items);
	}

	const CONN = {
		acquiring: { tone: 'muted', label: 'acquiring', footer: () => 'acquiring authority…' },
		live: { tone: 'ok', label: 'live', footer: () => 'live · receiving authority stream' },
		reconnecting: { tone: 'warn', label: 'reconnecting', footer: () => 'reconnecting · last beat ' + staleSecs() + 's ago' },
		offline: { tone: 'err', label: 'offline', footer: () => 'authority offline · last seen ' + staleSecs() + 's' },
	};
	function staleSecs() { return Math.round((Date.now() - lastBeatAt) / 1000); }
	function setConn(s) { if (connState === s) return; connState = s; updateConnUI(); }
	function updateConnUI() {
		const c = CONN[connState] || CONN.acquiring;
		chrome.setTeleBadge(c.tone, c.label);
		chrome.setTeleFooter(c.tone, c.footer());
		const dead = connState === 'offline';
		chrome.setTeleTone('server.tick', connState === 'reconnecting' ? 'warn' : dead ? 'err' : null);
	}

	// 1 Hz: extrapolate tick/remaining, refresh track duration + connection health
	setInterval(() => {
		if (sceneDurationTicks > 0) {
			chrome.setTele('remaining', fmtDuration(remainingTicks()));
			chrome.setTele('server.tick', tickNow().toLocaleString());
			renderLiveTrack();
		}
		const stale = staleSecs();
		if (connState === 'live' && stale > 4) setConn('reconnecting');
		if (connState !== 'offline' && stale > 15) setConn('offline');
		if (connState === 'offline' || connState === 'reconnecting') chrome.setTeleFooter((CONN[connState]).tone, CONN[connState].footer());
	}, 1000);

	function now() { return new Date().toTimeString().slice(0, 8); }

	function applySnapshot(snap) {
		const nextType = (snap && snap.type) || 'rain';
		const typeChanged = nextType !== effectType;
		if (!effect) {
			effect = newEffectInstance(nextType);
			try { effect.restoreSnapshot(snap); } catch (err) { console.error('restoreSnapshot', err); }
			setScene(nextType); loadSchema(nextType);
			chrome.appendLog({ t: now(), kind: 'scene', text: 'effect → ' + nextType });
		} else if (typeChanged) {
			const incoming = newEffectInstance(nextType);
			try { incoming.restoreSnapshot(snap); } catch (err) { console.error('restoreSnapshot', err); }
			effect = AmbienceSim.EffectTransition ? new AmbienceSim.EffectTransition(effect, incoming) : incoming;
			setScene(nextType); loadSchema(nextType);
			chrome.appendLog({ t: now(), kind: 'scene', text: 'effect → ' + nextType });
		} else {
			try { effect.restoreSnapshot(snap); } catch (err) { console.error('restoreSnapshot', err); }
		}
		latestConfig = snap.config || null;
		if (!typeChanged && latestConfig && chrome.getSchema()) chrome.setValues(latestConfig);
		if (snap.currentScene) { currentSceneName = snap.currentScene.name || '—'; sceneDurationTicks = snap.currentScene.durationTicks || 0; sceneStartTick = snap.currentScene.startedAtTick || 0; chrome.setTele('scene', currentSceneName); }
		if (snap.nextScene) { nextSceneName = snap.nextScene.name || '—'; chrome.setTele('up.next', L(nextSceneName)); }
		if (typeof snap.entropyBytes === 'number') { entropyBytes = snap.entropyBytes; chrome.setTele('entropy', fmtBytes(entropyBytes)); }
		if (typeof snap.sceneRemaining === 'number') chrome.setTele('remaining', fmtDuration(snap.sceneRemaining));
		renderLiveTrack();
	}

	async function startRuntime() {
		await AmbienceSim.wasm.ready();
		const es = new EventSource('/events');
		es.onmessage = (ev) => {
			let cmd; try { cmd = JSON.parse(ev.data); } catch (_) { return; }
			serverTick = cmd.tick || serverTick;
			lastBeatAt = Date.now();
			if (connState !== 'live') setConn('live'); else updateConnUI();
			switch (cmd.kind) {
				case 'snapshot': applySnapshot(cmd.data); ready = true; break;
				case 'config':
					if (!effect) break;
					try { effect.setConfig(cmd.data); } catch (_) {}
					latestConfig = cmd.data || null;
					if (latestConfig && chrome.getSchema()) chrome.setValues(latestConfig);
					break;
				case 'trigger':
					if (effect && effect.triggerEvent) effect.triggerEvent(cmd.event);
					chrome.appendLog({ t: now(), kind: 'trigger', text: cmd.event + (cmd.desc ? ' · ' + cmd.desc : '') });
					break;
				case 'scene':
					try {
						const sc = cmd.data;
						currentSceneName = sc.name || '—'; nextSceneName = sc.nextName || '—';
						sceneDurationTicks = sc.durationTicks || 0; sceneStartTick = sc.startedAtTick || 0;
						chrome.setTele('scene', currentSceneName); chrome.setTele('up.next', L(nextSceneName));
						chrome.appendLog({ t: now(), kind: 'scene', text: 'scene → ' + sc.name + ' · up next ' + sc.nextName });
						chrome.flashPanel(); renderLiveTrack();
					} catch (err) { console.error(err); }
					break;
				case 'metric':
					try {
						const m = cmd.data;
						if (typeof m.entropyBytes === 'number') { entropyBytes = m.entropyBytes; chrome.setTele('entropy', fmtBytes(entropyBytes)); }
						if (typeof m.sceneRemaining === 'number') chrome.setTele('remaining', fmtDuration(m.sceneRemaining));
						if (m.currentName) { currentSceneName = m.currentName; chrome.setTele('scene', currentSceneName); }
						if (m.nextName) { nextSceneName = m.nextName; chrome.setTele('up.next', L(nextSceneName)); }
					} catch (_) {}
					break;
			}
		};
		es.onerror = () => { setConn('reconnecting'); };

		setInterval(() => {
			if (!ready || !effect) return;
			effect.step();
			if (effect.isTransition && effect.done()) {
				if (effect.outgoing && typeof effect.outgoing.destroy === 'function') effect.outgoing.destroy();
				effect = effect.incoming;
			}
		}, 100);
		(function draw() {
			if (ready && effect) effect.render(ctx, canvas.width, canvas.height);
			requestAnimationFrame(draw);
		})();
	}

	// ── entropy capture (keystrokes fold into the shared RNG) ────────────────
	let entropyBuf = [];
	document.addEventListener('keydown', (event) => {
		const code = (event.key && event.key.length === 1) ? event.key.charCodeAt(0) : 0;
		if (code === 0) return;
		entropyBuf.push((code ^ (Date.now() & 0xff)) & 0xff);
		if (entropyBuf.length > 256) entropyBuf.splice(0, entropyBuf.length - 256);
	}, { passive: true });
	setInterval(() => {
		if (entropyBuf.length === 0) return;
		const bytes = entropyBuf.splice(0, entropyBuf.length);
		try { fetch('/entropy', { method: 'POST', body: new Uint8Array(bytes), keepalive: true }).catch(() => {}); } catch (_) {}
	}, 2000);

	// ── boot ─────────────────────────────────────────────────────────────
	setAuthUI();
	handleMicrosoftCallback();
	refreshControlAuth();
	startRuntime().catch((err) => { console.error(err); chrome.setLine('wasm runtime failed'); });
})();
</script>
</body>
</html>
