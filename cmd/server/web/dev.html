<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ambience — dev</title>
<style>
	html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; overflow: hidden; color: #e0e0e0; font-family: monospace; }
	#c { position: absolute; inset: 0; width: 100vw; height: 100vh; image-rendering: pixelated; }
	#panel {
		position: absolute; top: 10px; right: 10px; z-index: 10;
		background: rgba(0,0,0,0.7); padding: 12px 16px;
		border: 1px solid #333; border-radius: 4px;
		font-size: 12px; min-width: 280px;
	}
	#panel h1 { font-size: 12px; margin: 0 0 10px 0; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
	.row { display: flex; align-items: center; margin: 6px 0; gap: 12px; }
	.row label { opacity: 0.8; min-width: 56px; }
	.row input[type=range] { flex: 1; min-width: 100px; }
	.row .val { opacity: 0.6; min-width: 48px; text-align: right; font-variant-numeric: tabular-nums; }
	.row .swatch { width: 48px; height: 14px; border: 1px solid #333; }
	.status { margin-top: 10px; opacity: 0.5; font-size: 10px; word-break: break-all; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="panel">
	<h1>ambience dev — rain</h1>
	<div class="row">
		<label>wind</label>
		<input type="range" id="wind" min="-20" max="20" value="0">
		<span class="val" id="windVal">0.0</span>
	</div>
	<div class="row">
		<label>spawn 1/</label>
		<input type="range" id="spawn" min="1" max="30" value="5">
		<span class="val" id="spawnVal">5</span>
	</div>
	<div class="row">
		<label>fade</label>
		<input type="range" id="fade" min="40" max="95" value="65">
		<span class="val" id="fadeVal">0.65</span>
	</div>
	<div class="row">
		<label>hue</label>
		<input type="range" id="hue" min="0" max="359" value="210">
		<span class="val" id="hueVal">210°</span>
		<span class="swatch" id="hueSwatch"></span>
	</div>
	<div class="status" id="status">connecting…</div>
</div>
<script src="/ambience.js"></script>
<script>
	const canvas = document.getElementById('c');
	const status = document.getElementById('status');
	let amb = null;

	function windVal() { return (+document.getElementById('wind').value) / 10; }
	function fadeVal() { return (+document.getElementById('fade').value) / 100; }
	function hueVal() { return +document.getElementById('hue').value; }
	function spawnVal() { return +document.getElementById('spawn').value; }

	function updateReadouts() {
		document.getElementById('windVal').textContent = windVal().toFixed(1);
		document.getElementById('spawnVal').textContent = spawnVal();
		document.getElementById('fadeVal').textContent = fadeVal().toFixed(2);
		const h = hueVal();
		document.getElementById('hueVal').textContent = h + '°';
		document.getElementById('hueSwatch').style.background = `hsl(${h} 60% 65%)`;
	}

	function currentQuery() {
		const q = new URLSearchParams();
		q.set('wind', windVal().toFixed(2));
		q.set('spawn', spawnVal());
		q.set('fade', fadeVal().toFixed(2));
		q.set('hue', hueVal());
		return q.toString();
	}

	function reconnect() {
		if (amb) amb.close();
		const q = currentQuery();
		status.textContent = '? ' + q;
		amb = new Ambience({ canvas, stream: '/dev/stream?' + q });
	}

	let debounceT = null;
	function schedule() {
		updateReadouts();
		if (debounceT) clearTimeout(debounceT);
		debounceT = setTimeout(reconnect, 150);
	}

	['wind', 'spawn', 'fade', 'hue'].forEach((id) => {
		document.getElementById(id).addEventListener('input', schedule);
	});

	updateReadouts();
	reconnect();
</script>
</body>
</html>
