<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ambience — dev</title>
<style>
	html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; overflow: hidden; color: #e0e0e0; font-family: monospace; }
	#c { position: absolute; inset: 0; width: 100vw; height: 100vh; image-rendering: pixelated; }
	#panel {
		position: absolute; top: 10px; right: 10px; z-index: 10;
		background: rgba(0,0,0,0.78); padding: 10px 14px;
		border: 1px solid #333; border-radius: 4px;
		font-size: 11px; width: 280px; max-width: 280px;
		max-height: calc(100vh - 20px); overflow-y: auto;
	}
	#panel.collapsed .body { display: none; }
	#panel.collapsed { width: auto; }
	#panel h1 {
		font-size: 11px; margin: 0 0 8px 0; opacity: 0.6;
		text-transform: uppercase; letter-spacing: 1.2px;
		display: flex; justify-content: space-between; align-items: center;
	}
	#toggle {
		background: none; border: 1px solid #333; color: #e0e0e0;
		font-family: monospace; font-size: 10px; padding: 0 6px;
		cursor: pointer; border-radius: 2px;
	}
	#panel h2 { font-size: 10px; margin: 12px 0 4px 0; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #222; padding-bottom: 2px; }
	.row { display: flex; align-items: center; margin: 3px 0; gap: 8px; }
	.row label { opacity: 0.75; min-width: 76px; font-size: 10px; }
	.row input[type=range] { flex: 1; min-width: 70px; }
	.row .val { opacity: 0.6; min-width: 40px; text-align: right; font-variant-numeric: tabular-nums; font-size: 10px; }
	.row .swatch { width: 36px; height: 12px; border: 1px solid #333; }
	.status { margin-top: 10px; opacity: 0.5; font-size: 9px; word-break: break-all; line-height: 1.3; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="panel">
	<h1><span>ambience dev — rain</span><button id="toggle" title="collapse / expand (h)">–</button></h1>
	<div class="body">

	<h2>motion</h2>
	<div class="row"><label>wind</label><input type="range" id="wind" min="-30" max="30" value="0"><span class="val" id="wind_v">0.00</span></div>
	<div class="row"><label>wind jitter</label><input type="range" id="wind_jit" min="0" max="100" value="0"><span class="val" id="wind_jit_v">0.00</span></div>
	<div class="row"><label>speed</label><input type="range" id="speed" min="3" max="30" value="10"><span class="val" id="speed_v">1.00</span></div>
	<div class="row"><label>speed jitter</label><input type="range" id="speed_jit" min="0" max="100" value="0"><span class="val" id="speed_jit_v">0.00</span></div>

	<h2>shape</h2>
	<div class="row"><label>streak len</label><input type="range" id="streak" min="1" max="16" value="5"><span class="val" id="streak_v">5</span></div>
	<div class="row"><label>fade</label><input type="range" id="fade" min="50" max="100" value="88"><span class="val" id="fade_v">0.88</span></div>

	<h2>spawn</h2>
	<div class="row"><label>spawn 1/</label><input type="range" id="spawn" min="1" max="30" value="5"><span class="val" id="spawn_v">5</span></div>
	<div class="row"><label>burst max</label><input type="range" id="burst" min="1" max="8" value="1"><span class="val" id="burst_v">1</span></div>

	<h2>color</h2>
	<div class="row"><label>hue</label><input type="range" id="hue" min="0" max="359" value="210"><span class="val" id="hue_v">210°</span><span class="swatch" id="hue_s"></span></div>
	<div class="row"><label>hue spread</label><input type="range" id="hue_sp" min="0" max="180" value="0"><span class="val" id="hue_sp_v">0°</span></div>
	<div class="row"><label>saturation</label><input type="range" id="sat" min="0" max="100" value="60"><span class="val" id="sat_v">0.60</span></div>
	<div class="row"><label>light min</label><input type="range" id="lmin" min="5" max="95" value="55"><span class="val" id="lmin_v">0.55</span></div>
	<div class="row"><label>light max</label><input type="range" id="lmax" min="5" max="95" value="85"><span class="val" id="lmax_v">0.85</span></div>

	<h2>depth</h2>
	<div class="row"><label>layers</label><input type="range" id="layers" min="1" max="2" value="1"><span class="val" id="layers_v">1</span></div>
	<div class="row"><label>bg balance</label><input type="range" id="lbal" min="0" max="100" value="40"><span class="val" id="lbal_v">0.40</span></div>

	<div class="status" id="status">connecting…</div>
	</div>
</div>
<script src="/ambience.js"></script>
<script>
	const canvas = document.getElementById('c');
	const status = document.getElementById('status');
	let amb = null;

	// Each control maps its raw input value to the effective sim param via a
	// divisor (or no divisor for ints). Render formatter for the readout.
	const ctrls = [
		{ id: 'wind',     div: 10,  fmt: v => v.toFixed(2) },
		{ id: 'wind_jit', div: 100, fmt: v => v.toFixed(2) },
		{ id: 'speed',    div: 10,  fmt: v => v.toFixed(2) },
		{ id: 'speed_jit',div: 100, fmt: v => v.toFixed(2) },
		{ id: 'streak',   div: 1,   fmt: v => v.toFixed(0) },
		{ id: 'fade',     div: 100, fmt: v => v.toFixed(2) },
		{ id: 'spawn',    div: 1,   fmt: v => v.toFixed(0) },
		{ id: 'burst',    div: 1,   fmt: v => v.toFixed(0) },
		{ id: 'hue',      div: 1,   fmt: v => v.toFixed(0) + '°' },
		{ id: 'hue_sp',   div: 1,   fmt: v => v.toFixed(0) + '°' },
		{ id: 'sat',      div: 100, fmt: v => v.toFixed(2) },
		{ id: 'lmin',     div: 100, fmt: v => v.toFixed(2) },
		{ id: 'lmax',     div: 100, fmt: v => v.toFixed(2) },
		{ id: 'layers',   div: 1,   fmt: v => v.toFixed(0) },
		{ id: 'lbal',     div: 100, fmt: v => v.toFixed(2) },
	];

	function valOf(id) {
		const c = ctrls.find(c => c.id === id);
		return (+document.getElementById(id).value) / c.div;
	}

	function updateReadouts() {
		for (const c of ctrls) {
			document.getElementById(c.id + '_v').textContent = c.fmt(valOf(c.id));
		}
		const h = valOf('hue');
		document.getElementById('hue_s').style.background = `hsl(${h} ${Math.round(valOf('sat')*100)}% ${Math.round(((valOf('lmin')+valOf('lmax'))/2)*100)}%)`;
	}

	function currentQuery() {
		const q = new URLSearchParams();
		for (const c of ctrls) {
			const v = valOf(c.id);
			q.set(c.id, c.div === 1 ? v.toFixed(0) : v.toFixed(3));
		}
		return q.toString();
	}

	function reconnect() {
		if (amb) amb.close();
		const q = currentQuery();
		status.textContent = '? ' + q;
		amb = new Ambience({ canvas, stream: '/dev/stream?' + q });
	}

	let debounceT = null;
	function schedule() {
		updateReadouts();
		if (debounceT) clearTimeout(debounceT);
		debounceT = setTimeout(reconnect, 150);
	}

	for (const c of ctrls) {
		document.getElementById(c.id).addEventListener('input', schedule);
	}

	const panel = document.getElementById('panel');
	const toggle = document.getElementById('toggle');
	function setCollapsed(on) {
		panel.classList.toggle('collapsed', on);
		toggle.textContent = on ? '+' : '–';
	}
	toggle.addEventListener('click', () => setCollapsed(!panel.classList.contains('collapsed')));
	window.addEventListener('keydown', (e) => {
		if (e.target.tagName === 'INPUT') return;
		if (e.key === 'h') setCollapsed(!panel.classList.contains('collapsed'));
	});

	updateReadouts();
	reconnect();
</script>
</body>
</html>
