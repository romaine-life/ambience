name: Agent PR Cleanup

run-name: "Cleanup #${{ github.event.pull_request.number }} (${{ github.event.pull_request.head.ref }})"

# Reaps the ephemeral validation env created by agent-run.yml when the
# corresponding PR closes (merged or not). The env is named
# `ambience-issue-<N>-<run-id>-<short-sha>` and is labeled
# `ambience.io/pr=<pr-number>` after the PR is opened, so we find it by
# label rather than reconstructing the name.
#
# Only fires for PRs whose head ref starts with `agent/issue-` — manual
# PRs don't have an agent env and the job is a no-op anyway.
#
# Trigger: pull_request_target rather than pull_request. The pull_request
# trigger needs a merge commit context to fire and silently drops events
# when a PR closes without merging (clean or conflicting), which is
# exactly the case for failed-and-closed agent runs. pull_request_target
# runs against the base branch directly, so it fires reliably on every
# close. No security tradeoff here: agent PRs always come from same-repo
# branches (never forks), and this job needs Azure/cluster credentials
# anyway, so running in trusted base context is correct.

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: read
  id-token: write

jobs:
  cleanup:
    name: Reap agent validation env
    if: startsWith(github.event.pull_request.head.ref, 'agent/issue-')
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install ambience preview package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ./mcp

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Set AKS context
        env:
          AZURE_AKS_RESOURCE_GROUP: ${{ vars.AZURE_AKS_RESOURCE_GROUP }}
          AZURE_AKS_CLUSTER_NAME: ${{ vars.AZURE_AKS_CLUSTER_NAME }}
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "$AZURE_AKS_RESOURCE_GROUP" \
            --name "$AZURE_AKS_CLUSTER_NAME" \
            --overwrite-existing

      - name: Reap labeled namespaces + ACR tags
        run: |
          set -euo pipefail
          # Most runs produce exactly one namespace per PR. The loop is
          # correct even if a retry produced multiples.
          mapfile -t namespaces < <(kubectl get ns -l "ambience.io/pr=${PR_NUMBER}" \
            -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}')
          if [ "${#namespaces[@]}" -eq 0 ] || [ -z "${namespaces[0]:-}" ]; then
            echo "no namespaces labeled ambience.io/pr=${PR_NUMBER}; nothing to reap"
            exit 0
          fi
          for ns in "${namespaces[@]}"; do
            [ -z "$ns" ] && continue
            # Image tag is the namespace name minus the "ambience-" prefix
            # (deploy_preview tags the image identically to the slug).
            tag="${ns#ambience-}"
            echo "reaping ${ns} (image_tag=${tag})"
            python -m ambience_preview.cli destroy-validation-preview \
              --namespace "$ns" --release ambience-agent || true
            kubectl delete namespace "$ns" --ignore-not-found=true --wait=false || true
            az acr repository delete --name romainecr --image "ambience:${tag}" --yes || true
            az acr repository delete --name romainecr --image "ambience:${tag}-r2" --yes || true
          done
