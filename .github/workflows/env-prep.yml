name: Agent Run — env-prep

run-name: "#${{ inputs.issue_number }} env-prep ${{ inputs.issue_title }} (${{ inputs.host }})"

# Phase 1 of the multi-phase agent-run pipeline (glimmung#102 pattern,
# ambience rollout). Builds the per-issue preview image, deploys the
# validation env, and verifies the /_styleguide contract before any
# agent tokens spend.
#
# Emits validation_url + namespace + image_tag as phase outputs;
# glimmung threads them into agent-execute via workflow_dispatch.inputs
# (glimmung#101 substitution path).

on:
  workflow_dispatch:
    inputs:
      lease_id:
        description: Glimmung lease ID (ULID)
        required: true
        type: string
      host:
        description: Glimmung slot host (e.g. ambience-slot-1)
        required: true
        type: string
      issue_number:
        description: Issue number to address
        required: true
        type: string
      issue_title:
        description: Issue title (informational)
        required: false
        type: string
      issue_id:
        description: Glimmung Issue id (ULID, optional).
        required: false
        type: string
      gh_event:
        description: Originating GitHub event (informational)
        required: false
        type: string
      gh_action:
        description: Originating GitHub action (informational)
        required: false
        type: string
      run_id:
        description: Glimmung Run ULID (used for branch=glimmung/<run_id>)
        required: true
        type: string
      attempt_index:
        description: 0-based attempt index for this phase.
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

env:
  GLIMMUNG_BASE: https://glimmung.romaine.life
  GLIMMUNG_PROJECT: ambience
  PYTHONUNBUFFERED: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  route:
    name: Verify glimmung lease
    runs-on: ubuntu-latest
    steps:
      - name: Verify glimmung lease
        env:
          LEASE_ID: ${{ inputs.lease_id }}
          HOST: ${{ inputs.host }}
        run: |
          set -euo pipefail
          resp=$(curl -fsS "${GLIMMUNG_BASE}/v1/lease/${LEASE_ID}?project=${GLIMMUNG_PROJECT}")
          state=$(printf '%s' "$resp" | jq -r .state)
          host=$(printf '%s' "$resp" | jq -r .host)
          if [[ "$state" != "active" ]]; then
            echo "::error::lease ${LEASE_ID} state=${state} (expected active)"
            exit 1
          fi
          if [[ "$host" != "$HOST" ]]; then
            echo "::error::lease ${LEASE_ID} host=${host} (expected ${HOST})"
            exit 1
          fi
          echo "lease verified: ${LEASE_ID} active on ${HOST}"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Fetch GitHub App credentials from Key Vault
        env:
          KV_NAME: ${{ vars.KEY_VAULT_NAME }}
        run: |
          set -euo pipefail
          app_id=$(az keyvault secret show --vault-name "$KV_NAME" --name "github-app-id" --query value -o tsv)
          pem=$(az keyvault secret show --vault-name "$KV_NAME" --name "github-app-private-key" --query value -o tsv)
          echo "::add-mask::${app_id}"
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "::add-mask::${line}"
          done <<< "$pem"
          echo "GH_APP_ID=${app_id}" >> "$GITHUB_ENV"
          {
            echo "GH_APP_PRIVATE_KEY<<KEY_EOF"
            echo "$pem"
            echo "KEY_EOF"
          } >> "$GITHUB_ENV"

      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.GH_APP_ID }}
          private-key: ${{ env.GH_APP_PRIVATE_KEY }}

      - name: Comment with run link
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          HOST: ${{ inputs.host }}
        run: |
          set -euo pipefail
          if [ -z "${ISSUE_NUMBER}" ]; then
            echo "no issue_number; skipping run-start comment"
            exit 0
          fi
          body="agent run started (env-prep): ${RUN_URL} (host \`${HOST}\`)"
          gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
            -f "body=${body}" >/dev/null \
            || echo "::warning::failed to post run-start comment on #${ISSUE_NUMBER}; continuing"

  deploy:
    name: Build + deploy validation env
    needs: route
    runs-on: ubuntu-latest
    outputs:
      validation_url: ${{ steps.vars.outputs.validation_url }}
      namespace: ${{ steps.vars.outputs.namespace }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    env:
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      ISSUE_TITLE: ${{ inputs.issue_title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install ambience preview package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ./mcp

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Set AKS context
        env:
          AZURE_AKS_RESOURCE_GROUP: ${{ vars.AZURE_AKS_RESOURCE_GROUP }}
          AZURE_AKS_CLUSTER_NAME: ${{ vars.AZURE_AKS_CLUSTER_NAME }}
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "$AZURE_AKS_RESOURCE_GROUP" \
            --name "$AZURE_AKS_CLUSTER_NAME" \
            --overwrite-existing

      - name: Compute run-scoped variables
        id: vars
        env:
          GLIMMUNG_RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${GLIMMUNG_RUN_ID}" ]; then
            echo "::error::missing inputs.run_id (required under glimmung#69)"
            exit 1
          fi
          short_sha=$(git rev-parse --short=7 HEAD)
          slug="issue-${ISSUE_NUMBER}-${GITHUB_RUN_ID}-${short_sha}"
          namespace="ambience-${slug}"
          host="${slug}.ambience.dev.romaine.life"
          image_tag="${slug}"

          {
            echo "NAMESPACE=${namespace}"
            echo "VALIDATION_HOST=${host}"
            echo "VALIDATION_URL=https://${host}"
            echo "IMAGE_TAG=${image_tag}"
          } >> "$GITHUB_ENV"

          # Phase outputs (consumed by agent-execute via glimmung's
          # input substitution path).
          {
            echo "validation_url=https://${host}"
            echo "namespace=${namespace}"
            echo "image_tag=${image_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Notify glimmung — env-prep started
        env:
          GLIMMUNG_RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail
          payload=$(jq -nc \
            --argjson rid "${GITHUB_RUN_ID}" \
            --arg vurl "${VALIDATION_URL}" \
            '{workflow_run_id: $rid, validation_url: $vurl}')
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${GLIMMUNG_BASE}/v1/runs/${GLIMMUNG_PROJECT}/${GLIMMUNG_RUN_ID}/started" \
            || echo "::warning::failed to post started callback to glimmung; continuing"

      - name: Build preview image
        run: |
          set -euo pipefail
          python -m ambience_preview.cli build-preview-image --image-tag "${IMAGE_TAG}" > /tmp/preview-image.json
          image=$(python -c "import json,pathlib; print(json.loads(pathlib.Path('/tmp/preview-image.json').read_text())['image'])")
          echo "IMAGE=${image}" >> "$GITHUB_ENV"

      - name: Upsert validation env
        run: |
          set -euo pipefail
          # ambience-issue-* namespace pattern → reflector replicates
          # the claude-oauth-ca ConfigMap automatically.
          python -m ambience_preview.cli deploy-validation-preview \
            --namespace "${NAMESPACE}" \
            --image "${IMAGE}" \
            --release ambience-agent \
            --public-host "${VALIDATION_HOST}"

      - name: Wait for validation env to be ready
        run: |
          set -euo pipefail
          python -m ambience_preview.cli wait-public-preview --url "${VALIDATION_URL}"

  verify-styleguide:
    name: Verify /_styleguide contract
    needs: deploy
    uses: nelsong6/pipeline-templates/.github/workflows/verify-styleguide.yml@main
    with:
      validation_url: ${{ needs.deploy.outputs.validation_url }}
      glimmung_project: ambience
      glimmung_run_id: ${{ inputs.run_id }}

  notify-completed:
    name: Notify glimmung — env-prep completed
    needs: [deploy, verify-styleguide]
    runs-on: ubuntu-latest
    steps:
      - name: Post completed callback with phase outputs
        # Phase output capture (glimmung#101): keys here MUST match the
        # registered phase's `outputs` list exactly or glimmung 400s.
        env:
          GLIMMUNG_RUN_ID: ${{ inputs.run_id }}
          VALIDATION_URL: ${{ needs.deploy.outputs.validation_url }}
          NAMESPACE: ${{ needs.deploy.outputs.namespace }}
          IMAGE_TAG: ${{ needs.deploy.outputs.image_tag }}
        run: |
          set -euo pipefail
          payload=$(jq -nc \
            --argjson rid "${GITHUB_RUN_ID}" \
            --arg conclusion "success" \
            --arg vurl "${VALIDATION_URL}" \
            --arg ns "${NAMESPACE}" \
            --arg itag "${IMAGE_TAG}" \
            '{
              workflow_run_id: $rid,
              conclusion: $conclusion,
              outputs: {
                validation_url: $vurl,
                namespace: $ns,
                image_tag: $itag
              }
            }')
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${GLIMMUNG_BASE}/v1/runs/${GLIMMUNG_PROJECT}/${GLIMMUNG_RUN_ID}/completed" \
            || echo "::warning::failed to post completed callback to glimmung; continuing"

  cleanup-on-failure:
    name: Tear down validation env on failure
    needs: [deploy, verify-styleguide]
    # Run if either upstream job failed/cancelled. The deploy job may
    # have stood up a namespace + ACR tag before failing, and a
    # verify-styleguide failure leaves both alive on cluster. Both need
    # reaping so we don't orphan resources.
    if: |
      always() && (
        needs.deploy.result == 'failure' || needs.deploy.result == 'cancelled' ||
        needs.verify-styleguide.result == 'failure' || needs.verify-styleguide.result == 'cancelled'
      ) && needs.deploy.outputs.namespace != ''
    runs-on: ubuntu-latest
    env:
      NAMESPACE: ${{ needs.deploy.outputs.namespace }}
      IMAGE_TAG: ${{ needs.deploy.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install ambience preview package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ./mcp

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Set AKS context
        env:
          AZURE_AKS_RESOURCE_GROUP: ${{ vars.AZURE_AKS_RESOURCE_GROUP }}
          AZURE_AKS_CLUSTER_NAME: ${{ vars.AZURE_AKS_CLUSTER_NAME }}
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "$AZURE_AKS_RESOURCE_GROUP" \
            --name "$AZURE_AKS_CLUSTER_NAME" \
            --overwrite-existing

      - name: Tear down namespace + ACR tag
        run: |
          set -euo pipefail
          python -m ambience_preview.cli destroy-validation-preview \
            --namespace "${NAMESPACE}" \
            --release ambience-agent || true
          kubectl delete namespace "${NAMESPACE}" --ignore-not-found=true --wait=false || true
          if [ -n "${IMAGE_TAG:-}" ]; then
            az acr repository delete --name romainecr --image "ambience:${IMAGE_TAG}" --yes || true
          fi

  release-lease:
    name: Release glimmung lease
    needs: [route, deploy, verify-styleguide]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Release lease
        run: |
          set -euo pipefail
          curl -fsS -X POST "${GLIMMUNG_BASE}/v1/lease/${{ inputs.lease_id }}/release?project=${GLIMMUNG_PROJECT}" >/dev/null
