name: Build Native Glimmung Runner Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/runner/Dockerfile"
      - ".github/workflows/build-native-runner-image.yml"
      - "mcp/**"
      - "scripts/glimmung-native/**"
      - "scripts/test-glimmung-native-contract.sh"
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA to build. Leave blank to build the dispatch revision."
        required: false
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: build-native-glimmung-runner-image
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build native runner image and push to ACR
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve requested ref
        env:
          INPUT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'

          target_ref="${INPUT_REF:-$GITHUB_SHA}"
          if full_sha="$(git rev-parse --verify "${target_ref}^{commit}" 2>/dev/null)"; then
            :
          elif git show-ref --verify --quiet "refs/remotes/origin/${target_ref}"; then
            full_sha="$(git rev-parse "refs/remotes/origin/${target_ref}^{commit}")"
          elif git show-ref --verify --quiet "refs/tags/${target_ref}"; then
            full_sha="$(git rev-parse "refs/tags/${target_ref}^{commit}")"
          else
            echo "::error::Unable to resolve git_ref '${target_ref}' to a commit."
            exit 1
          fi

          git checkout --detach "$full_sha"
          echo "resolved ${target_ref} -> ${full_sha}"

      - name: Check native runner contract
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/test-glimmung-native-contract.sh
          bash -n scripts/glimmung-native/*.sh scripts/test-glimmung-native-contract.sh

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image fingerprint
        id: fingerprint
        shell: bash
        run: |
          set -euo pipefail
          fingerprint="$(scripts/image-fingerprint.sh \
            --image native-runner \
            --dockerfile .github/runner/Dockerfile \
            --context . \
            --paths '.github/runner/Dockerfile scripts/glimmung-native' \
            | tee /tmp/ambience-native-runner-fingerprint.txt \
            | awk -F= '$1 == "fingerprint" { print $2 }')"
          echo "ALIAS_TAG=native-runner-${fingerprint}" >> "$GITHUB_ENV"

      - name: Check existing image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          if az acr repository show-tags \
              --name romainecr \
              --repository ambience-agent-runner \
              --query "[?@=='${ALIAS_TAG}'] | [0]" \
              --output tsv | grep -qx "${ALIAS_TAG}"; then
            echo "exists=true" >>"${GITHUB_OUTPUT}"
            echo "Found reusable image romainecr.azurecr.io/ambience-agent-runner:${ALIAS_TAG}"
          else
            echo "exists=false" >>"${GITHUB_OUTPUT}"
            echo "No reusable image found for native-runner fingerprint ${{ steps.fingerprint.outputs.fingerprint }}"
          fi

      - name: Build and push image
        if: steps.image.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/runner/Dockerfile
          push: true
          tags: romainecr.azurecr.io/ambience-agent-runner:${{ env.ALIAS_TAG }}
          cache-from: type=registry,ref=romainecr.azurecr.io/ambience-build-cache:native-runner
          cache-to: type=registry,ref=romainecr.azurecr.io/ambience-build-cache:native-runner,mode=max
