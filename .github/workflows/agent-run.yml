name: Agent Run

run-name: "#${{ inputs.issue_number }} ${{ inputs.issue_title }} (${{ inputs.host }})"

# Glimmung is the entry point. https://glimmung.romaine.life/v1/webhook/github
# receives the GitHub `issues` event, atomically claims a host, and fires this
# workflow_dispatch with lease_id + host + issue_number. Heavy lifting (Claude
# run) happens inside an in-cluster k8s Job that talks to the tank-operator
# claude-api-proxy for subscription-token auth — the GHA runner only
# orchestrates.

on:
  workflow_dispatch:
    inputs:
      lease_id:
        description: Glimmung lease ID (ULID)
        required: true
        type: string
      host:
        description: Glimmung slot host (e.g. ambience-slot-1)
        required: true
        type: string
      issue_number:
        description: Issue number to address
        required: true
        type: string
      issue_title:
        description: Issue title (informational)
        required: false
        type: string
      gh_event:
        description: Originating GitHub event (informational)
        required: false
        type: string
      gh_action:
        description: Originating GitHub action (informational)
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

env:
  GLIMMUNG_BASE: https://glimmung.romaine.life
  GLIMMUNG_PROJECT: ambience
  CLAUDE_CONTAINER_TAG: latest

jobs:
  route:
    name: Verify glimmung lease
    runs-on: ubuntu-latest
    steps:
      - name: Verify glimmung lease
        env:
          LEASE_ID: ${{ inputs.lease_id }}
          HOST: ${{ inputs.host }}
        run: |
          set -euo pipefail
          resp=$(curl -fsS "${GLIMMUNG_BASE}/v1/lease/${LEASE_ID}?project=${GLIMMUNG_PROJECT}")
          state=$(printf '%s' "$resp" | jq -r .state)
          host=$(printf '%s' "$resp" | jq -r .host)
          if [[ "$state" != "active" ]]; then
            echo "::error::lease ${LEASE_ID} state=${state} (expected active)"
            exit 1
          fi
          if [[ "$host" != "$HOST" ]]; then
            echo "::error::lease ${LEASE_ID} host=${host} (expected ${HOST})"
            exit 1
          fi
          echo "lease verified: ${LEASE_ID} active on ${HOST}"

  agent:
    name: Run agent + open PR
    needs: route
    runs-on: ubuntu-latest
    env:
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      ISSUE_TITLE: ${{ inputs.issue_title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Start glimmung heartbeat (background)
        env:
          LEASE_ID: ${{ inputs.lease_id }}
        run: |
          set -euo pipefail
          (
            while true; do
              curl -fsS -X POST "${GLIMMUNG_BASE}/v1/lease/${LEASE_ID}/heartbeat?project=${GLIMMUNG_PROJECT}" >/dev/null 2>&1 || true
              sleep 60
            done
          ) &
          echo "$!" > /tmp/heartbeat.pid

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install ambience preview package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ./mcp

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Set AKS context
        env:
          AZURE_AKS_RESOURCE_GROUP: ${{ vars.AZURE_AKS_RESOURCE_GROUP }}
          AZURE_AKS_CLUSTER_NAME: ${{ vars.AZURE_AKS_CLUSTER_NAME }}
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "$AZURE_AKS_RESOURCE_GROUP" \
            --name "$AZURE_AKS_CLUSTER_NAME" \
            --overwrite-existing

      - name: Compute run-scoped variables
        id: vars
        run: |
          set -euo pipefail
          short_sha=$(git rev-parse --short=7 HEAD)
          slug="issue-${ISSUE_NUMBER}-${GITHUB_RUN_ID}-${short_sha}"
          namespace="ambience-${slug}"
          host="${slug}.ambience.dev.romaine.life"
          job_name="agent-${slug}"
          branch="agent/issue-${ISSUE_NUMBER}-${GITHUB_RUN_ID}"
          image_tag="${slug}"
          {
            echo "NAMESPACE=${namespace}"
            echo "VALIDATION_HOST=${host}"
            echo "VALIDATION_URL=https://${host}"
            echo "JOB_NAME=${job_name}"
            echo "BRANCH_NAME=${branch}"
            echo "IMAGE_TAG=${image_tag}"
            echo "ISSUE_URL=https://github.com/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}"
          } >> "$GITHUB_ENV"

      - name: Build preview image
        id: image
        run: |
          set -euo pipefail
          python -m ambience_preview.cli build-preview-image --image-tag "${IMAGE_TAG}" > /tmp/preview-image.json
          image=$(python -c "import json,pathlib; print(json.loads(pathlib.Path('/tmp/preview-image.json').read_text())['image'])")
          echo "IMAGE=${image}" >> "$GITHUB_ENV"

      - name: Upsert validation env
        run: |
          set -euo pipefail
          # ambience-issue-* namespace pattern → reflector replicates the
          # claude-oauth-ca ConfigMap in automatically (annotation source
          # is tank-operator-sessions, target match is ambience-issue-.*).
          python -m ambience_preview.cli deploy-validation-preview \
            --namespace "${NAMESPACE}" \
            --image "${IMAGE}" \
            --release ambience-agent \
            --public-host "${VALIDATION_HOST}"

      - name: Wait for validation env to be ready
        run: |
          set -euo pipefail
          python -m ambience_preview.cli wait-public-preview --url "${VALIDATION_URL}"

      - name: Resolve claude-api-proxy ClusterIP
        run: |
          set -euo pipefail
          ip=$(kubectl -n tank-operator get svc claude-api-proxy -o jsonpath='{.spec.clusterIP}')
          if [ -z "$ip" ]; then
            echo "::error::claude-api-proxy Service not found in tank-operator namespace"
            exit 1
          fi
          echo "PROXY_IP=${ip}" >> "$GITHUB_ENV"

      - name: Provision agent ConfigMap + GitHub-token Secret
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" create configmap agent-config \
            --from-file=prompt.md=.github/agent/prompt.md \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "${NAMESPACE}" create secret generic agent-github-token \
            --from-literal=token="${GITHUB_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply agent Job
        run: |
          set -euo pipefail
          # Scope envsubst to ONLY the workflow-set templating vars. Without
          # this, every `${VAR}` in the rendered YAML — including bash-script
          # references like ${REPO_SLUG}, ${GH_TOKEN}, ${HOME} — gets blanked
          # out, because envsubst can't find them in the workflow shell env.
          # The Job's bash command needs those to stay literal so the
          # container's shell evaluates them at runtime.
          export ISSUE_NUMBER ISSUE_TITLE ISSUE_URL VALIDATION_URL BRANCH_NAME NAMESPACE JOB_NAME PROXY_IP CLAUDE_CONTAINER_TAG
          envsubst '$ISSUE_NUMBER $ISSUE_TITLE $ISSUE_URL $VALIDATION_URL $BRANCH_NAME $NAMESPACE $JOB_NAME $PROXY_IP $CLAUDE_CONTAINER_TAG' \
            < .github/agent/job.yaml | kubectl apply -f -

      - name: Stream + wait for Job
        id: job
        run: |
          set -euo pipefail
          # Wait for the Job's pod to appear, then `kubectl logs -f` blocks
          # until the pod terminates (success or failure). After that, check
          # `.status.succeeded` directly — the Job's `Complete` condition
          # only fires on success, so a failed Job would have made
          # `kubectl wait --for=condition=complete` block all the way to its
          # 30-minute timeout. Counting succeeded pods is monotonic and
          # works for either outcome.
          pod=""
          for _ in $(seq 1 30); do
            pod=$(kubectl -n "${NAMESPACE}" get pods -l "job-name=${JOB_NAME}" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            [ -n "$pod" ] && break
            sleep 2
          done
          if [ -z "$pod" ]; then
            echo "::error::Job pod never appeared"
            exit 1
          fi
          kubectl -n "${NAMESPACE}" logs -f "$pod" || true

          succeeded=$(kubectl -n "${NAMESPACE}" get job "${JOB_NAME}" -o jsonpath='{.status.succeeded}' 2>/dev/null || echo 0)
          failed=$(kubectl -n "${NAMESPACE}" get job "${JOB_NAME}" -o jsonpath='{.status.failed}' 2>/dev/null || echo 0)
          if [ "${succeeded:-0}" -ge 1 ]; then
            echo "agent Job succeeded (succeeded=${succeeded})"
            exit 0
          fi
          echo "::error::agent Job failed (failed=${failed:-0})"
          exit 1

      - name: Open pull request
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr create \
            --base main \
            --head "${BRANCH_NAME}" \
            --title "agent: ${ISSUE_TITLE} (#${ISSUE_NUMBER})" \
            --body "Closes #${ISSUE_NUMBER}.

          Validation env (until PR closes): ${VALIDATION_URL}

          Generated by glimmung-leased agent run on host \`${{ inputs.host }}\` (lease \`${{ inputs.lease_id }}\`)."

      - name: Tear down validation env
        if: always()
        run: |
          set -euo pipefail
          python -m ambience_preview.cli destroy-validation-preview --namespace "${NAMESPACE}" --release ambience-agent || true
          kubectl delete namespace "${NAMESPACE}" --ignore-not-found=true --wait=false || true

      - name: Stop heartbeat
        if: always()
        run: |
          if [ -f /tmp/heartbeat.pid ]; then
            kill "$(cat /tmp/heartbeat.pid)" 2>/dev/null || true
          fi

  release-lease:
    name: Release glimmung lease
    needs: [route, agent]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Release lease
        run: |
          set -euo pipefail
          curl -fsS -X POST "${GLIMMUNG_BASE}/v1/lease/${{ inputs.lease_id }}/release?project=${GLIMMUNG_PROJECT}" >/dev/null
