name: Agent Run

run-name: "#${{ inputs.issue_number }} ${{ inputs.issue_title }} (${{ inputs.host }})"

# Glimmung is the entry point. https://glimmung.romaine.life/v1/webhook/github
# receives the GitHub `issues` event, atomically claims a host, and fires this
# workflow_dispatch with lease_id + host + issue_number. Heavy lifting (Claude
# run + screenshot/notes capture) happens inside an in-cluster k8s Job that
# talks to the tank-operator claude-api-proxy for subscription-token auth —
# the GHA runner only orchestrates and copies evidence out.

on:
  workflow_dispatch:
    inputs:
      lease_id:
        description: Glimmung lease ID (ULID)
        required: true
        type: string
      host:
        description: Glimmung slot host (e.g. ambience-slot-1)
        required: true
        type: string
      issue_number:
        description: Issue number to address
        required: true
        type: string
      issue_title:
        description: Issue title (informational)
        required: false
        type: string
      gh_event:
        description: Originating GitHub event (informational)
        required: false
        type: string
      gh_action:
        description: Originating GitHub action (informational)
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

env:
  GLIMMUNG_BASE: https://glimmung.romaine.life
  GLIMMUNG_PROJECT: ambience
  # agent-container is the issue-runner image (playwright noble + Go +
  # claude-code) maintained in tank-operator/agent-container/. Distinct
  # from claude-container which serves human sessions and stays slim.
  # The :latest tag tracks the most recent agent-container build; pin to
  # a SHA here if you need to lock a specific run.
  AGENT_CONTAINER_TAG: latest
  # Make python's stdout line-buffered so step output streams live to the
  # GHA UI instead of pooling until the step exits. Critical for the
  # Stream + wait for Job step where the kubectl-logs-f stream is the
  # only signal during long agent runs.
  PYTHONUNBUFFERED: "1"
  # Same idea for any stdio that sits behind glibc/musl line buffering.
  PYTHONIOENCODING: "utf-8"

jobs:
  route:
    name: Verify glimmung lease
    runs-on: ubuntu-latest
    steps:
      - name: Verify glimmung lease
        env:
          LEASE_ID: ${{ inputs.lease_id }}
          HOST: ${{ inputs.host }}
        run: |
          set -euo pipefail
          resp=$(curl -fsS "${GLIMMUNG_BASE}/v1/lease/${LEASE_ID}?project=${GLIMMUNG_PROJECT}")
          state=$(printf '%s' "$resp" | jq -r .state)
          host=$(printf '%s' "$resp" | jq -r .host)
          if [[ "$state" != "active" ]]; then
            echo "::error::lease ${LEASE_ID} state=${state} (expected active)"
            exit 1
          fi
          if [[ "$host" != "$HOST" ]]; then
            echo "::error::lease ${LEASE_ID} host=${host} (expected ${HOST})"
            exit 1
          fi
          echo "lease verified: ${LEASE_ID} active on ${HOST}"

      # ------------------------------------------------------------------
      # Mint a GitHub App installation token (1h TTL) for all GH calls in
      # this job. App credentials live in romaine-kv:
      #   - github-app-id          : romaine-life-app App ID
      #   - github-app-private-key : the App's PEM private key
      # We use the App rather than secrets.GITHUB_TOKEN because the default
      # token lacks "create or approve pull requests" (a repo-level toggle)
      # and we want a consistent App identity for everything (comments,
      # cluster-side push, gh pr create).
      # ------------------------------------------------------------------

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Fetch GitHub App credentials from Key Vault
        env:
          KV_NAME: ${{ vars.KEY_VAULT_NAME }}
        run: |
          set -euo pipefail
          app_id=$(az keyvault secret show --vault-name "$KV_NAME" --name "github-app-id" --query value -o tsv)
          pem=$(az keyvault secret show --vault-name "$KV_NAME" --name "github-app-private-key" --query value -o tsv)
          # GHA's add-mask is per-line for multi-line values.
          echo "::add-mask::${app_id}"
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "::add-mask::${line}"
          done <<< "$pem"
          echo "GH_APP_ID=${app_id}" >> "$GITHUB_ENV"
          {
            echo "GH_APP_PRIVATE_KEY<<KEY_EOF"
            echo "$pem"
            echo "KEY_EOF"
          } >> "$GITHUB_ENV"

      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.GH_APP_ID }}
          private-key: ${{ env.GH_APP_PRIVATE_KEY }}

      - name: Comment with run link
        # Best-effort one-line link from the originating issue to this run.
        # Mirrors spirelens. Failure here never sinks the run.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          HOST: ${{ inputs.host }}
        run: |
          set -euo pipefail
          if [ -z "${ISSUE_NUMBER}" ]; then
            echo "no issue_number; skipping run-start comment"
            exit 0
          fi
          body="agent run started: ${RUN_URL} (host \`${HOST}\`)"
          gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
            -f "body=${body}" >/dev/null \
            || echo "::warning::failed to post run-start comment on #${ISSUE_NUMBER}; continuing"

  agent:
    name: Run agent + open PR
    needs: route
    runs-on: ubuntu-latest
    env:
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      ISSUE_TITLE: ${{ inputs.issue_title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install ambience preview package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ./mcp

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Fetch GitHub App credentials from Key Vault
        env:
          KV_NAME: ${{ vars.KEY_VAULT_NAME }}
        run: |
          set -euo pipefail
          app_id=$(az keyvault secret show --vault-name "$KV_NAME" --name "github-app-id" --query value -o tsv)
          pem=$(az keyvault secret show --vault-name "$KV_NAME" --name "github-app-private-key" --query value -o tsv)
          echo "::add-mask::${app_id}"
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "::add-mask::${line}"
          done <<< "$pem"
          echo "GH_APP_ID=${app_id}" >> "$GITHUB_ENV"
          {
            echo "GH_APP_PRIVATE_KEY<<KEY_EOF"
            echo "$pem"
            echo "KEY_EOF"
          } >> "$GITHUB_ENV"

      - name: Mint GitHub App installation token
        # 1h TTL — long enough for the agent run + rebuild + evidence
        # capture + PR open. Used by the cluster-side agent to clone+push,
        # and by the runner-side `gh pr create` step.
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.GH_APP_ID }}
          private-key: ${{ env.GH_APP_PRIVATE_KEY }}

      - name: Set AKS context
        env:
          AZURE_AKS_RESOURCE_GROUP: ${{ vars.AZURE_AKS_RESOURCE_GROUP }}
          AZURE_AKS_CLUSTER_NAME: ${{ vars.AZURE_AKS_CLUSTER_NAME }}
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "$AZURE_AKS_RESOURCE_GROUP" \
            --name "$AZURE_AKS_CLUSTER_NAME" \
            --overwrite-existing

      - name: Compute run-scoped variables
        id: vars
        run: |
          set -euo pipefail
          short_sha=$(git rev-parse --short=7 HEAD)
          slug="issue-${ISSUE_NUMBER}-${GITHUB_RUN_ID}-${short_sha}"
          namespace="ambience-${slug}"
          host="${slug}.ambience.dev.romaine.life"
          job_name="agent-${slug}"
          branch="agent/issue-${ISSUE_NUMBER}-${GITHUB_RUN_ID}"
          image_tag="${slug}"
          {
            echo "NAMESPACE=${namespace}"
            echo "VALIDATION_HOST=${host}"
            echo "VALIDATION_URL=https://${host}"
            echo "JOB_NAME=${job_name}"
            echo "BRANCH_NAME=${branch}"
            echo "IMAGE_TAG=${image_tag}"
            echo "ISSUE_URL=https://github.com/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}"
          } >> "$GITHUB_ENV"

      - name: Build preview image
        id: image
        run: |
          set -euo pipefail
          python -m ambience_preview.cli build-preview-image --image-tag "${IMAGE_TAG}" > /tmp/preview-image.json
          image=$(python -c "import json,pathlib; print(json.loads(pathlib.Path('/tmp/preview-image.json').read_text())['image'])")
          echo "IMAGE=${image}" >> "$GITHUB_ENV"

      - name: Upsert validation env
        run: |
          set -euo pipefail
          # ambience-issue-* namespace pattern → reflector replicates the
          # claude-oauth-ca ConfigMap in automatically (annotation source
          # is tank-operator-sessions, target match is ambience-issue-.*).
          python -m ambience_preview.cli deploy-validation-preview \
            --namespace "${NAMESPACE}" \
            --image "${IMAGE}" \
            --release ambience-agent \
            --public-host "${VALIDATION_HOST}"

      - name: Wait for validation env to be ready
        run: |
          set -euo pipefail
          python -m ambience_preview.cli wait-public-preview --url "${VALIDATION_URL}"

      - name: Resolve claude-api-proxy ClusterIP
        run: |
          set -euo pipefail
          ip=$(kubectl -n tank-operator get svc claude-api-proxy -o jsonpath='{.spec.clusterIP}')
          if [ -z "$ip" ]; then
            echo "::error::claude-api-proxy Service not found in tank-operator namespace"
            exit 1
          fi
          echo "PROXY_IP=${ip}" >> "$GITHUB_ENV"

      - name: Provision agent ConfigMap + GitHub-token Secret
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" create configmap agent-config \
            --from-file=prompt.md=.github/agent/prompt.md \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "${NAMESPACE}" create secret generic agent-github-token \
            --from-literal=token="${GITHUB_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -
        env:
          # Use the App installation token (1h TTL) so the agent's clone +
          # push happens as `romaine-life-app[bot]` instead of as the
          # ephemeral GHA bot.
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Apply agent Job
        run: |
          set -euo pipefail
          # Job spec is built in Python (mcp/ambience_preview/ops.py::apply_agent_job).
          # No string templating: run-specific values are CLI args; bash-side
          # `${VAR}` refs in the container's command stay literal because the
          # script is a plain Python string, not an f-string.
          python -m ambience_preview.cli apply-agent-job \
            --namespace "${NAMESPACE}" \
            --job-name "${JOB_NAME}" \
            --issue-number "${ISSUE_NUMBER}" \
            --issue-title "${ISSUE_TITLE}" \
            --issue-url "${ISSUE_URL}" \
            --validation-url "${VALIDATION_URL}" \
            --branch-name "${BRANCH_NAME}" \
            --proxy-ip "${PROXY_IP}" \
            --agent-container-tag "${AGENT_CONTAINER_TAG}"

      - name: Stream + wait for Job
        id: job
        run: |
          set -euo pipefail
          # wait_agent_job polls the Pod to Running|Succeeded|Failed, streams
          # logs to stdout, then polls Job .status.succeeded/.status.failed
          # until terminal — fast-fails on either outcome instead of waiting
          # the old `kubectl wait --for=condition=complete --timeout=30m`
          # path that blocked for the full timeout on every Job failure.
          python -m ambience_preview.cli wait-agent-job \
            --namespace "${NAMESPACE}" \
            --job-name "${JOB_NAME}" \
            --timeout-seconds 1800

      - name: Capture agent event log
        # Re-fetch the Pod's stdout (claude `--output-format stream-json`
        # interleaved with the bash bootstrap) into a file we can parse for
        # the summary comment. The Pod has ttlSecondsAfterFinished=1800 so
        # logs are still available on success and on failure — failure is
        # when we want this evidence the most, so this runs on always().
        if: always()
        run: |
          set -euo pipefail
          pod=$(kubectl -n "${NAMESPACE}" get pods -l "job-name=${JOB_NAME}" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -z "${pod}" ]; then
            echo "no pod found for job ${JOB_NAME}; skipping event capture"
            : > /tmp/agent-pod.log
            : > /tmp/agent-events.jsonl
            exit 0
          fi
          kubectl -n "${NAMESPACE}" logs "${pod}" > /tmp/agent-pod.log || true
          # Filter to JSON-object lines (drops bash bootstrap stdout). Each
          # line is a single claude stream-json event.
          grep -E '^\{' /tmp/agent-pod.log > /tmp/agent-events.jsonl || true
          echo "captured $(wc -l < /tmp/agent-events.jsonl) event lines from ${pod}"

      - name: Capture agent evidence from pod log
        # Extract the base64-encoded tarball that the agent's bash
        # bootstrap streams to stdout right before exit, captured in
        # /tmp/agent-pod.log by the previous "Capture agent event log"
        # step. Why not kubectl cp? Because the bash script exits
        # immediately after the tar block, transitioning the pod to
        # Succeeded — and `kubectl cp` against a Succeeded pod fails
        # (its tar-over-exec mechanism needs a live container). Streaming
        # through stdout is timing-independent: kubectl logs preserves it.
        #
        # Non-fatal: an extraction failure here (corrupted tar, missing
        # markers, log truncation) shouldn't block PR creation. If we
        # can't extract evidence, we still want the PR opened with a
        # warning rather than aborting the whole run.
        id: evidence
        if: success()
        run: |
          set -uo pipefail
          mkdir -p /tmp/evidence
          if grep -q '===EVIDENCE-TAR-START===' /tmp/agent-pod.log; then
            if ! sed -n '/===EVIDENCE-TAR-START===/,/===EVIDENCE-TAR-END===/{//!p;}' \
                /tmp/agent-pod.log \
                | base64 -d 2>/tmp/extract.err \
                | tar -xzf - -C /tmp/evidence 2>>/tmp/extract.err; then
              echo "::warning::evidence tarball extraction failed; PR will open without screenshots/notes. stderr:"
              cat /tmp/extract.err >&2 || true
              # Wipe whatever partial files landed so downstream globs
              # don't pick up half-extracted junk.
              rm -rf /tmp/evidence
              mkdir -p /tmp/evidence
            fi
          else
            echo "::warning::no evidence tar markers found in agent pod log"
          fi
          echo "evidence files extracted:"
          find /tmp/evidence -type f 2>/dev/null | sort || true
          have_screenshots=false
          if compgen -G "/tmp/evidence/screenshots/*.png" >/dev/null; then
            have_screenshots=true
          fi
          have_notes=false
          if [ -s /tmp/evidence/notes.md ]; then
            have_notes=true
          fi
          # Deep-link contract: the agent writes the path the reviewer
          # should open (e.g. `/dev/burning-trees`) to validation-path.txt.
          # We append it to VALIDATION_URL so the PR-body "Validation env"
          # link lands on the feature instead of the bare host. Missing /
          # malformed file → fall back to the bare host (refactors, docs).
          deep_validation_url=""
          if [ -s /tmp/evidence/validation-path.txt ]; then
            path=$(head -1 /tmp/evidence/validation-path.txt | tr -d '[:space:]')
            case "${path}" in
              /*) deep_validation_url="${VALIDATION_URL}${path}" ;;
              "") ;;
              *) echo "::warning::validation-path.txt content '${path}' missing leading slash; falling back to bare host" ;;
            esac
          fi
          echo "have_screenshots=${have_screenshots}" >> "$GITHUB_OUTPUT"
          echo "have_notes=${have_notes}" >> "$GITHUB_OUTPUT"
          echo "deep_validation_url=${deep_validation_url}" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Post-agent verify: rebuild the validation env from the agent's
      # pushed branch so the URL in the PR body actually reflects the
      # diff. Distinct from evidence — evidence comes from the agent's
      # own captures inside the pod (above); the rebuild env is for the
      # human reviewer's interactive validation after the PR opens.
      # ------------------------------------------------------------------

      - name: Fetch agent branch onto runner
        if: success()
        run: |
          set -euo pipefail
          git fetch origin "${BRANCH_NAME}"
          git checkout -B "${BRANCH_NAME}" "origin/${BRANCH_NAME}"

      - name: Rebuild validation env from agent branch
        if: success()
        run: |
          set -euo pipefail
          # Use a distinct tag so the rebuild is auditable and so teardown
          # can reclaim both the original and the rebuild image.
          rebuild_tag="${IMAGE_TAG}-r2"
          echo "REBUILT_IMAGE_TAG=${rebuild_tag}" >> "$GITHUB_ENV"
          python -m ambience_preview.cli rebuild-validation-image \
            --namespace "${NAMESPACE}" \
            --branch "${BRANCH_NAME}" \
            --image-tag "${rebuild_tag}"

      - name: Wait for rebuilt validation env
        if: success()
        run: |
          set -euo pipefail
          python -m ambience_preview.cli wait-public-preview --url "${VALIDATION_URL}"

      - name: Refresh Azure OIDC login
        # azure/login@v2's OIDC JWT assertion is valid for 5 minutes only.
        # The agent + rebuild + capture takes 10-15 min, so by upload time
        # the cached JWT is stale and `az storage` hits AADSTS700024
        # ("Client assertion is not within its valid time range"). Re-login
        # mints a fresh JWT.
        if: success() && steps.evidence.outputs.have_screenshots == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Upload screenshots to Azure blob
        # Non-fatal: a flaky storage account or transient AAD blip should
        # not abort the PR open. If upload fails we still emit a degraded
        # markdown block so the PR body explains why screenshots are
        # missing instead of silently dropping them. Capped at
        # MAX_SCREENSHOTS sorted PNGs to bound blast radius of an agent
        # loop bug that floods the screenshot dir.
        id: upload
        if: success() && steps.evidence.outputs.have_screenshots == 'true'
        continue-on-error: true
        env:
          STORAGE_ACCOUNT: ${{ vars.AGENT_SCREENSHOT_STORAGE_ACCOUNT }}
          CONTAINER: ${{ vars.AGENT_SCREENSHOT_CONTAINER }}
          CONTAINER_URL: ${{ vars.AGENT_SCREENSHOT_CONTAINER_URL }}
          MAX_SCREENSHOTS: "20"
        run: |
          set -euo pipefail
          prefix="issue-${ISSUE_NUMBER}/${GITHUB_RUN_ID}"

          staging=$(mktemp -d)
          mapfile -t pngs < <(find /tmp/evidence/screenshots -maxdepth 1 -type f -name '*.png' | sort)
          total=${#pngs[@]}
          taken=0
          for f in "${pngs[@]}"; do
            [ "${taken}" -lt "${MAX_SCREENSHOTS}" ] || break
            cp "${f}" "${staging}/"
            taken=$((taken + 1))
          done
          echo "uploading ${taken}/${total} screenshots (cap ${MAX_SCREENSHOTS})"

          upload_ok=true
          if ! az storage blob upload-batch \
              --account-name "${STORAGE_ACCOUNT}" \
              --destination "${CONTAINER}" \
              --destination-path "${prefix}" \
              --source "${staging}" \
              --auth-mode login \
              --overwrite true; then
            upload_ok=false
            echo "::warning::screenshot upload failed; PR body will note this"
          fi

          {
            echo "markdown<<EOF_MD"
            echo "## Screenshots"
            echo ""
            if [ "${upload_ok}" = "false" ]; then
              echo "_Screenshot upload failed — see [run logs](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})._"
              echo ""
            else
              if [ "${total}" -gt "${taken}" ]; then
                echo "_Showing first ${taken} of ${total} screenshots._"
                echo ""
              fi
              for f in "${staging}"/*.png; do
                [ -e "${f}" ] || continue
                base=$(basename "${f}")
                echo "### ${base%.png}"
                echo ""
                echo "![${base%.png}](${CONTAINER_URL}/${prefix}/${base})"
                echo ""
              done
            fi
            echo "EOF_MD"
          } >> "$GITHUB_OUTPUT"

      - name: Open pull request and label env
        if: success()
        env:
          # App token avoids the "GitHub Actions is not permitted to
          # create or approve pull requests" GraphQL error from the
          # default secrets.GITHUB_TOKEN.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SCREENSHOTS_MD: ${{ steps.upload.outputs.markdown }}
          HAVE_NOTES: ${{ steps.evidence.outputs.have_notes }}
          DEEP_VALIDATION_URL: ${{ steps.evidence.outputs.deep_validation_url }}
        run: |
          set -euo pipefail
          # Prefer the agent-declared deep-link (e.g.
          # https://<host>/dev/burning-trees) so reviewers click straight
          # into the feature; fall back to the bare host when the agent
          # didn't write validation-path.txt (refactors, docs).
          if [ -n "${DEEP_VALIDATION_URL}" ]; then
            link_url="${DEEP_VALIDATION_URL}"
          else
            link_url="${VALIDATION_URL}"
          fi
          body_file=$(mktemp)
          {
            echo "Closes #${ISSUE_NUMBER}."
            echo ""
            # Render as HTML <a target="_blank"> so the validation env opens
            # in a new tab — GitHub's Markdown sanitizer permits target/rel on
            # <a>, so reviewers stay on the PR while the env loads alongside.
            echo "Validation env (until PR closes): <a href=\"${link_url}\" target=\"_blank\" rel=\"noopener noreferrer\">${link_url}</a>"
            echo ""
            # Agent-authored notes go first — the agent owns the framing
            # and may include secondary deep-link URLs, command output, or
            # non-screenshot evidence in here. The primary validation
            # deep-link is already on the line above via
            # validation-path.txt.
            if [ "${HAVE_NOTES}" = "true" ]; then
              cat /tmp/evidence/notes.md
              echo ""
            fi
            if [ -n "${SCREENSHOTS_MD:-}" ]; then
              printf '%s\n' "${SCREENSHOTS_MD}"
              echo ""
            fi
            echo "Generated by glimmung-leased agent run on host \`${{ inputs.host }}\` (lease \`${{ inputs.lease_id }}\`)."
          } > "${body_file}"
          pr_url=$(gh pr create \
            --base main \
            --head "${BRANCH_NAME}" \
            --title "agent: ${ISSUE_TITLE} (#${ISSUE_NUMBER})" \
            --body-file "${body_file}")
          echo "${pr_url}"
          pr_number=$(printf '%s' "${pr_url}" | grep -oE 'pull/[0-9]+' | tr -dc '0-9')
          # Label the namespace so agent-pr-cleanup.yml can find and reap
          # it when the PR closes. Best-effort: a labeling failure leaves
          # the env orphaned but the PR still opens; we log loudly so
          # cleanup can be done by hand.
          if [ -z "${pr_number}" ] || ! kubectl label namespace "${NAMESPACE}" "ambience.io/pr=${pr_number}" --overwrite; then
            echo "::warning::failed to label namespace ${NAMESPACE} with ambience.io/pr=${pr_number:-?}; manual teardown may be required when the PR closes"
          fi
          echo "PR_NUMBER=${pr_number}" >> "$GITHUB_ENV"

      - name: Summarize agent run
        # Parse claude stream-json events into a metrics table (cost,
        # turns, tool calls, tokens). Always runs — on failure the issue
        # still gets a closing-the-loop comment with the run link instead
        # of going silent. Posts to: $GITHUB_STEP_SUMMARY (run page), the
        # originating issue, and the PR if one was opened. Mirrors
        # spirelens's summarize-issue-agent.ps1.
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          events=/tmp/agent-events.jsonl
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body_file=$(mktemp)

          if [ -s "${events}" ]; then
            # Sum across all claude `result` events. Single-phase flows
            # produce one, but the sum form is correct either way.
            cost=$(jq -r 'select(.type=="result") | .total_cost_usd // 0' "${events}" \
              | awk '{s+=$1} END {printf "%.4f", s}')
            turns=$(jq -r 'select(.type=="result") | .num_turns // 0' "${events}" \
              | awk '{s+=$1} END {printf "%d", s}')
            input=$(jq -r 'select(.type=="result") | .usage.input_tokens // 0' "${events}" \
              | awk '{s+=$1} END {printf "%d", s}')
            output=$(jq -r 'select(.type=="result") | .usage.output_tokens // 0' "${events}" \
              | awk '{s+=$1} END {printf "%d", s}')
            cache_create=$(jq -r 'select(.type=="result") | .usage.cache_creation_input_tokens // 0' "${events}" \
              | awk '{s+=$1} END {printf "%d", s}')
            cache_read=$(jq -r 'select(.type=="result") | .usage.cache_read_input_tokens // 0' "${events}" \
              | awk '{s+=$1} END {printf "%d", s}')
            tools=$(jq -r 'select(.type=="assistant") | .message.content[]? | select(.type=="tool_use") | .name' "${events}" \
              | wc -l | tr -d ' ')
            tool_breakdown=$(jq -r 'select(.type=="assistant") | .message.content[]? | select(.type=="tool_use") | .name' "${events}" \
              | sort | uniq -c | sort -rn | awk '{printf "  - %s: %d\n", $2, $1}')
            {
              echo "## Agent run summary"
              echo ""
              echo "| Metric | Value |"
              echo "| --- | ---: |"
              echo "| Status | ${JOB_STATUS} |"
              echo "| Run | [${GITHUB_RUN_ID}](${run_url}) |"
              echo "| Issue | #${ISSUE_NUMBER} |"
              echo "| Cost | \$${cost} |"
              echo "| Turns | ${turns} |"
              echo "| Tool calls | ${tools} |"
              echo "| Input tokens | ${input} |"
              echo "| Output tokens | ${output} |"
              echo "| Cache creation tokens | ${cache_create} |"
              echo "| Cache read tokens | ${cache_read} |"
              echo ""
              if [ -n "${tool_breakdown}" ]; then
                echo "### Tool calls"
                echo ""
                printf '%s\n' "${tool_breakdown}"
              fi
            } > "${body_file}"
          else
            # No events captured — agent likely failed before producing
            # any stream-json output. Still post a closing-the-loop note
            # so the issue isn't left dangling.
            {
              echo "## Agent run summary"
              echo ""
              echo "| Metric | Value |"
              echo "| --- | ---: |"
              echo "| Status | ${JOB_STATUS} |"
              echo "| Run | [${GITHUB_RUN_ID}](${run_url}) |"
              echo "| Issue | #${ISSUE_NUMBER} |"
              echo ""
              echo "_No agent events captured — see run logs for failure detail._"
            } > "${body_file}"
          fi

          # 1. Always render to the run page summary.
          cat "${body_file}" >> "${GITHUB_STEP_SUMMARY}"

          # 2. Always close the loop on the originating issue.
          if [ -n "${ISSUE_NUMBER:-}" ]; then
            gh issue comment "${ISSUE_NUMBER}" --body-file "${body_file}" \
              || echo "::warning::failed to post summary on issue #${ISSUE_NUMBER}; continuing"
          fi

          # 3. Mirror to the PR if one was opened.
          if [ -n "${PR_NUMBER:-}" ]; then
            gh pr comment "${PR_NUMBER}" --body-file "${body_file}" \
              || echo "::warning::failed to post summary comment on PR #${PR_NUMBER}; continuing"
          fi

      - name: Tear down validation env on failure
        # Successful runs leave the env alive — agent-pr-cleanup.yml reaps
        # it when the PR closes (matched by the ambience.io/pr=<N> label
        # set above). This step only runs on failure / cancellation, so
        # busted runs don't orphan a namespace + ACR tag.
        if: failure() || cancelled()
        run: |
          set -euo pipefail
          python -m ambience_preview.cli destroy-validation-preview --namespace "${NAMESPACE}" --release ambience-agent || true
          kubectl delete namespace "${NAMESPACE}" --ignore-not-found=true --wait=false || true
          if [ -n "${IMAGE_TAG:-}" ]; then
            az acr repository delete --name romainecr --image "ambience:${IMAGE_TAG}" --yes || true
          fi
          if [ -n "${REBUILT_IMAGE_TAG:-}" ]; then
            az acr repository delete --name romainecr --image "ambience:${REBUILT_IMAGE_TAG}" --yes || true
          fi

  release-lease:
    name: Release glimmung lease
    needs: [route, agent]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Release lease
        run: |
          set -euo pipefail
          curl -fsS -X POST "${GLIMMUNG_BASE}/v1/lease/${{ inputs.lease_id }}/release?project=${GLIMMUNG_PROJECT}" >/dev/null
