name: Docker Build Check

on:
  pull_request:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA to build. Leave blank to build the dispatch revision."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: docker-build-check-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}-${{ inputs.git_ref || '' }}
  cancel-in-progress: true

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Resolve image source ref
        id: source
        env:
          INPUT_REF: ${{ inputs.git_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'
          if [ -n "${PR_HEAD_SHA}" ]; then
            full_sha="${PR_HEAD_SHA}"
          elif [ -n "${INPUT_REF}" ]; then
            if full_sha="$(git rev-parse --verify "${INPUT_REF}^{commit}" 2>/dev/null)"; then
              :
            elif git show-ref --verify --quiet "refs/remotes/origin/${INPUT_REF}"; then
              full_sha="$(git rev-parse "refs/remotes/origin/${INPUT_REF}^{commit}")"
            elif git show-ref --verify --quiet "refs/tags/${INPUT_REF}"; then
              full_sha="$(git rev-parse "refs/tags/${INPUT_REF}^{commit}")"
            else
              echo "::error::Unable to resolve git_ref '${INPUT_REF}' to a commit."
              exit 1
            fi
          else
            full_sha="$(git rev-parse HEAD)"
          fi
          git checkout --detach "$full_sha"
          echo "Resolved image source -> ${full_sha}"
          echo "sha=${full_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            file: Dockerfile
            context: .
            cache-ref: romainecr.azurecr.io/ambience-build-cache:app
            image-repo: ambience
            fingerprint-paths: Dockerfile go.mod go.sum scripts/build-web-wasm.sh rngutil sim cmd/ambience cmd/ambience-wasm
          - name: native-runner
            file: .github/runner/Dockerfile
            context: .
            cache-ref: romainecr.azurecr.io/ambience-build-cache:native-runner
            image-repo: ambience-agent-runner
            # Native-runner only bakes its Dockerfile and runtime scripts.
            # Tooling changes should touch the Dockerfile; script changes are
            # the only repo content copied into the image.
            fingerprint-paths: .github/runner/Dockerfile scripts/glimmung-native
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image source ref
        id: source
        env:
          INPUT_REF: ${{ inputs.git_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'
          if [ -n "${PR_HEAD_SHA}" ]; then
            full_sha="${PR_HEAD_SHA}"
          elif [ -n "${INPUT_REF}" ]; then
            if full_sha="$(git rev-parse --verify "${INPUT_REF}^{commit}" 2>/dev/null)"; then
              :
            elif git show-ref --verify --quiet "refs/remotes/origin/${INPUT_REF}"; then
              full_sha="$(git rev-parse "refs/remotes/origin/${INPUT_REF}^{commit}")"
            elif git show-ref --verify --quiet "refs/tags/${INPUT_REF}"; then
              full_sha="$(git rev-parse "refs/tags/${INPUT_REF}^{commit}")"
            else
              echo "::error::Unable to resolve git_ref '${INPUT_REF}' to a commit."
              exit 1
            fi
          else
            full_sha="$(git rev-parse HEAD)"
          fi
          git checkout --detach "$full_sha"
          echo "Resolved image source -> ${full_sha}"
          echo "sha=${full_sha}" >> "${GITHUB_OUTPUT}"

      - name: Check native runner contract
        if: matrix.name == 'native-runner'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/test-glimmung-native-contract.sh
          bash -n scripts/glimmung-native/*.sh scripts/test-glimmung-native-contract.sh

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login (OIDC)
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        run: az acr login --name romainecr

      - name: Compute image fingerprint
        id: fingerprint
        shell: bash
        run: |
          set -euo pipefail
          scripts/image-fingerprint.sh \
            --image '${{ matrix.name }}' \
            --dockerfile '${{ matrix.file }}' \
            --context '${{ matrix.context }}' \
            --paths '${{ matrix.fingerprint-paths }}'

      - name: Check ACR candidate image
        id: candidate
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.fingerprint.outputs.proof_tag }}"
          if az acr repository show-tags \
              --name romainecr \
              --repository "${{ matrix.image-repo }}" \
              --query "[?@=='${tag}'] | [0]" \
              --output tsv | grep -qx "${tag}"; then
            echo "hit=true" >>"${GITHUB_OUTPUT}"
            echo "Found reusable candidate image: romainecr.azurecr.io/${{ matrix.image-repo }}:${tag}"
          else
            echo "hit=false" >>"${GITHUB_OUTPUT}"
            echo "No candidate image found for ${{ matrix.name }} fingerprint ${{ steps.fingerprint.outputs.fingerprint }}"
          fi

      - name: Build and push candidate image
        if: (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)) && steps.candidate.outputs.hit != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: romainecr.azurecr.io/${{ matrix.image-repo }}:${{ steps.fingerprint.outputs.proof_tag }}
          cache-from: |
            type=registry,ref=${{ matrix.cache-ref }}
            type=gha,scope=${{ matrix.name }}
          cache-to: |
            type=registry,ref=${{ matrix.cache-ref }},mode=max
            type=gha,mode=max,scope=${{ matrix.name }}

      - name: Tag app image by CI lookup
        # App image identity remains the fingerprint tag. This run-scoped
        # lookup tag is only for Glimmung deploy-image resolution and points
        # at the same ACR manifest, whether this run built or reused it.
        if: matrix.name == 'app' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          SOURCE_TAG: ${{ steps.fingerprint.outputs.proof_tag }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            lookup_tag="ci-pr-${PR_NUMBER}-run-${RUN_ID}-attempt-${RUN_ATTEMPT}"
          else
            if [[ -z "${SOURCE_SHA}" ]]; then
              echo "::error::SOURCE_SHA is required for non-PR CI lookup tags."
              exit 1
            fi
            ref_hash="$(printf '%s' "${SOURCE_SHA}" | sha256sum | cut -c1-12)"
            lookup_tag="ci-ref-${ref_hash}-run-${RUN_ID}-attempt-${RUN_ATTEMPT}"
          fi

          az acr import --name romainecr \
            --source "romainecr.azurecr.io/${{ matrix.image-repo }}:${SOURCE_TAG}" \
            --image "${{ matrix.image-repo }}:${lookup_tag}" --force
          echo "Tagged romainecr.azurecr.io/${{ matrix.image-repo }}:${lookup_tag} -> ${SOURCE_TAG}"

      - name: Build image without pushing
        if: github.event_name != 'workflow_dispatch' && github.ref != 'refs/heads/main' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
