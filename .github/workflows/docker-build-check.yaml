name: Docker Build Check

on:
  pull_request:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA to build. Leave blank to build the dispatch revision."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: docker-build-check-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}-${{ inputs.git_ref || '' }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            file: Dockerfile
            context: .
            cache-ref: romainecr.azurecr.io/ambience-build-cache:app
            proof-repo: ambience-build-proof
            # The app Dockerfile copies the repository context after dependency
            # restore. Hash all tracked files so this stays conservative while
            # the Dockerfile still uses COPY . .
            fingerprint-paths: .
          - name: native-runner
            file: .github/runner/Dockerfile
            context: .
            cache-ref: romainecr.azurecr.io/ambience-build-cache:native-runner
            proof-repo: ambience-build-proof
            # Native-runner only bakes its Dockerfile and runtime scripts.
            # Tooling changes should touch the Dockerfile; script changes are
            # the only repo content copied into the image.
            fingerprint-paths: .github/runner/Dockerfile scripts/glimmung-native
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve requested ref
        if: github.event_name == 'workflow_dispatch' && inputs.git_ref != ''
        env:
          INPUT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'
          if full_sha="$(git rev-parse --verify "${INPUT_REF}^{commit}" 2>/dev/null)"; then
            :
          elif git show-ref --verify --quiet "refs/remotes/origin/${INPUT_REF}"; then
            full_sha="$(git rev-parse "refs/remotes/origin/${INPUT_REF}^{commit}")"
          elif git show-ref --verify --quiet "refs/tags/${INPUT_REF}"; then
            full_sha="$(git rev-parse "refs/tags/${INPUT_REF}^{commit}")"
          else
            echo "::error::Unable to resolve git_ref '${INPUT_REF}' to a commit."
            exit 1
          fi
          git checkout --detach "$full_sha"
          echo "Resolved ${INPUT_REF} -> ${full_sha}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login (OIDC)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: az acr login --name romainecr

      - name: Compute image fingerprint
        id: fingerprint
        shell: bash
        run: |
          set -euo pipefail

          tmp="$(mktemp -d)"
          manifest="${tmp}/manifest.txt"
          : >"${manifest}"

          for path in ${{ matrix.fingerprint-paths }}; do
            if [[ "${path}" == "." ]]; then
              git ls-files -z \
                | sort -z \
                | xargs -0 sha256sum >>"${manifest}"
            elif [[ -d "${path}" ]]; then
              git ls-files -z -- "${path}" \
                | sort -z \
                | xargs -0 sha256sum >>"${manifest}"
            elif [[ -f "${path}" ]]; then
              sha256sum "${path}" >>"${manifest}"
            else
              echo "::error::Fingerprint input '${path}' does not exist"
              exit 1
            fi
          done

          {
            printf 'image=%s\n' '${{ matrix.name }}'
            printf 'dockerfile=%s\n' '${{ matrix.file }}'
            printf 'context=%s\n' '${{ matrix.context }}'
            printf 'buildx=docker/build-push-action@v6\n'
          } >>"${manifest}"

          fingerprint="$(sha256sum "${manifest}" | cut -d' ' -f1)"
          tag="${{ matrix.name }}-${fingerprint}"
          echo "fingerprint=${fingerprint}" >>"${GITHUB_OUTPUT}"
          echo "proof_tag=${tag}" >>"${GITHUB_OUTPUT}"
          echo "proof_ref=romainecr.azurecr.io/${{ matrix.proof-repo }}:${tag}" >>"${GITHUB_OUTPUT}"
          echo "Fingerprint ${{ matrix.name }} ${fingerprint}"

      - name: Check ACR build proof
        id: proof
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.fingerprint.outputs.proof_tag }}"
          if az acr repository show-tags \
              --name romainecr \
              --repository "${{ matrix.proof-repo }}" \
              --query "[?@=='${tag}'] | [0]" \
              --output tsv | grep -qx "${tag}"; then
            echo "hit=true" >>"${GITHUB_OUTPUT}"
            echo "Found prior successful build proof: ${{ steps.fingerprint.outputs.proof_ref }}"
          else
            echo "hit=false" >>"${GITHUB_OUTPUT}"
            echo "No build proof found for ${{ matrix.name }} fingerprint ${{ steps.fingerprint.outputs.fingerprint }}"
          fi

      - name: Build image without pushing
        if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && steps.proof.outputs.hit != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: false
          cache-from: |
            type=registry,ref=${{ matrix.cache-ref }}
            type=gha,scope=${{ matrix.name }}
          cache-to: |
            type=registry,ref=${{ matrix.cache-ref }},mode=max
            type=gha,mode=max,scope=${{ matrix.name }}

      - name: Publish ACR build proof
        if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && steps.proof.outputs.hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          {
            printf 'FROM scratch\n'
            printf 'LABEL org.opencontainers.image.title="ambience docker build proof"\n'
            printf 'LABEL life.romaine.ambience.image="%s"\n' '${{ matrix.name }}'
            printf 'LABEL life.romaine.ambience.fingerprint="%s"\n' '${{ steps.fingerprint.outputs.fingerprint }}'
          } >"${tmp}/Dockerfile"
          docker buildx build \
            --file "${tmp}/Dockerfile" \
            --tag "${{ steps.fingerprint.outputs.proof_ref }}" \
            --push \
            "${tmp}"

      - name: Build image without pushing
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
