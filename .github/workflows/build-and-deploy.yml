name: Build Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - chart/ambience/values-prod.yaml
      - chart/ambience/values.yaml
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA to build. Leave blank to build the dispatch revision."
        required: false
        type: string

permissions:
  id-token: write
  contents: write

concurrency:
  group: build-image
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build image and push to ACR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve requested ref
        env:
          INPUT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail

          # Fetch refs so short SHAs, remote branches, and tags can all
          # resolve cleanly during manual dispatches.
          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'

          TARGET_REF="${INPUT_REF:-$GITHUB_SHA}"
          FULL_SHA=""

          if FULL_SHA="$(git rev-parse --verify "${TARGET_REF}^{commit}" 2>/dev/null)"; then
            :
          elif git show-ref --verify --quiet "refs/remotes/origin/${TARGET_REF}"; then
            FULL_SHA="$(git rev-parse "refs/remotes/origin/${TARGET_REF}^{commit}")"
          elif git show-ref --verify --quiet "refs/tags/${TARGET_REF}"; then
            FULL_SHA="$(git rev-parse "refs/tags/${TARGET_REF}^{commit}")"
          else
            echo "::error::Unable to resolve git_ref '${TARGET_REF}' to a commit."
            exit 1
          fi

          git checkout --detach "${FULL_SHA}"
          echo "Resolved ${TARGET_REF} -> ${FULL_SHA}"

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image fingerprint
        id: fingerprint
        shell: bash
        run: |
          set -euo pipefail
          fingerprint="$(scripts/image-fingerprint.sh \
            --image app \
            --dockerfile Dockerfile \
            --context . \
            --paths 'Dockerfile go.mod go.sum scripts/build-web-wasm.sh rngutil sim cmd/ambience cmd/ambience-wasm' \
            | tee /tmp/ambience-image-fingerprint.txt \
            | awk -F= '$1 == "fingerprint" { print $2 }')"
          echo "ALIAS_TAG=app-${fingerprint}" >> "$GITHUB_ENV"

      - name: Check existing image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          if az acr repository show-tags \
              --name romainecr \
              --repository ambience \
              --query "[?@=='${ALIAS_TAG}'] | [0]" \
              --output tsv | grep -qx "${ALIAS_TAG}"; then
            echo "exists=true" >>"${GITHUB_OUTPUT}"
            echo "Found reusable image romainecr.azurecr.io/ambience:${ALIAS_TAG}"
          else
            echo "exists=false" >>"${GITHUB_OUTPUT}"
            echo "No reusable image found for app fingerprint ${{ steps.fingerprint.outputs.fingerprint }}"
          fi

      - name: Build and push image
        if: steps.image.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: romainecr.azurecr.io/ambience:${{ env.ALIAS_TAG }}
          cache-from: type=registry,ref=romainecr.azurecr.io/ambience-build-cache:app
          cache-to: type=registry,ref=romainecr.azurecr.io/ambience-build-cache:app,mode=max

      - name: Bump chart image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          # Bump the SHA-pinned image.tag in BOTH the prod values file and
          # the base values file. The base file is what Glimmung-managed
          # warm test slots pin to (they install the chart with default
          # values only); without this sync, slots drift behind prod and
          # surface bugs already fixed upstream.
          python - <<'PY'
          from pathlib import Path

          tag = "${{ env.ALIAS_TAG }}"
          paths = [Path("chart/ambience/values-prod.yaml"), Path("chart/ambience/values.yaml")]
          for path in paths:
              lines = path.read_text().splitlines()
              in_image = False
              changed = False
              out = []
              for line in lines:
                  stripped = line.strip()
                  if stripped and not line.startswith(" ") and line.endswith(":"):
                      in_image = stripped == "image:"
                  if in_image and line.startswith("  tag:"):
                      new_line = f"  tag: \"{tag}\""
                      changed = changed or line != new_line
                      out.append(new_line)
                  else:
                      out.append(line)
              if changed:
                  path.write_text("\n".join(out) + "\n")
          PY
          files=(chart/ambience/values-prod.yaml chart/ambience/values.yaml)
          if git diff --quiet -- "${files[@]}"; then
            echo "Chart image tag already ${ALIAS_TAG}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "chore: bump ambience image to ${ALIAS_TAG} [skip ci]"
          git push origin HEAD:main
