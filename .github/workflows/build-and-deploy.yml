name: Build Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - chart/ambience/values-prod.yaml
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA to build. Leave blank to build the dispatch revision."
        required: false
        type: string

permissions:
  id-token: write
  contents: write

concurrency:
  group: build-image
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build image and push to ACR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve requested ref
        env:
          INPUT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail

          # Fetch refs so short SHAs, remote branches, and tags can all
          # resolve cleanly during manual dispatches.
          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'

          TARGET_REF="${INPUT_REF:-$GITHUB_SHA}"
          FULL_SHA=""

          if FULL_SHA="$(git rev-parse --verify "${TARGET_REF}^{commit}" 2>/dev/null)"; then
            :
          elif git show-ref --verify --quiet "refs/remotes/origin/${TARGET_REF}"; then
            FULL_SHA="$(git rev-parse "refs/remotes/origin/${TARGET_REF}^{commit}")"
          elif git show-ref --verify --quiet "refs/tags/${TARGET_REF}"; then
            FULL_SHA="$(git rev-parse "refs/tags/${TARGET_REF}^{commit}")"
          else
            echo "::error::Unable to resolve git_ref '${TARGET_REF}' to a commit."
            exit 1
          fi

          git checkout --detach "${FULL_SHA}"
          echo "Resolved ${TARGET_REF} -> ${FULL_SHA}"

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Resolve image tag
        run: |
          TAG="$(git rev-parse --short=7 HEAD)"
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "Built ref $(git rev-parse HEAD) as romainecr.azurecr.io/ambience:${TAG}" >> $GITHUB_STEP_SUMMARY

      - name: Build and push image
        run: |
          IMAGE="romainecr.azurecr.io/ambience:${TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Bump production image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("chart/ambience/values-prod.yaml")
          tag = "${{ env.TAG }}"
          lines = path.read_text().splitlines()
          in_image = False
          changed = False
          out = []
          for line in lines:
              stripped = line.strip()
              if stripped and not line.startswith(" ") and line.endswith(":"):
                  in_image = stripped == "image:"
              if in_image and line.startswith("  tag:"):
                  new_line = f"  tag: {tag}"
                  changed = changed or line != new_line
                  out.append(new_line)
              else:
                  out.append(line)
          if changed:
              path.write_text("\n".join(out) + "\n")
          PY
          if git diff --quiet -- chart/ambience/values-prod.yaml; then
            echo "Production image tag already ${TAG}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chart/ambience/values-prod.yaml
          git commit -m "chore: bump ambience image to ${TAG} [skip ci]"
          git push origin HEAD:main
