name: Build Image

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA to build. Leave blank to build the dispatch revision."
        required: false
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: build-image
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build image and push to ACR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Resolve image tag
        run: |
          TAG="$(git rev-parse --short=7 HEAD)"
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "Built ref $(git rev-parse HEAD) as romainecr.azurecr.io/ambience:${TAG}" >> $GITHUB_STEP_SUMMARY

      - name: Build and push image
        run: |
          IMAGE="romainecr.azurecr.io/ambience:${TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
