phases:
  - name: prepare
    kind: k8s_job
    run_on: success
    purpose: work
    workflow_filename: ""
    workflow_ref: main
    inputs: {}
    outputs:
      - claude_ca_namespace
      - claude_namespace
      - image_tag
      - issue_contract
      - namespace
      - validation_slot_index
      - validation_url
    requirements: {}
    verify: false
    recycle_policy: null
    evidence_verification_gate: false
    depends_on: []
    jobs:
      - id: env-prep
        name: Environment prep
        image: ""
        command: []
        args: []
        env:
          AZURE_SUBSCRIPTION_ID: aee0cbd2-8074-4001-b610-0f8edb4eaa3c
        steps:
          - slug: clone-repo
            title: Clone repo
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/env-prep.sh
          - slug: build-validation-image
            title: Build validation image
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/env-prep.sh
          - slug: push-validation-image
            title: Verify validation image
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/env-prep.sh
          - slug: reap-slot-conflicts
            title: Reap slot conflicts
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/env-prep.sh
          - slug: deploy-validation-env
            title: Deploy validation env
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/env-prep.sh
          - slug: check-validation-env
            title: Check validation env
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/env-prep.sh
          - slug: emit-env-outputs
            title: Emit env outputs
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/env-prep.sh
        timeout_seconds: 2400
        managed: true
        checkout:
          repo: nelsong6/ambience
          ref: main
          path: /workspace/ambience
        working_directory: /workspace
      - id: issue-contract
        name: 'LLM: issue contract'
        image: ""
        command: []
        args: []
        env:
          AGENT_CONTAINER_TAG: latest
          AZURE_SUBSCRIPTION_ID: aee0cbd2-8074-4001-b610-0f8edb4eaa3c
        steps:
          - slug: clone
            title: Clone repo
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/issue-contract.sh
          - slug: prepare
            title: Prepare context
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/issue-contract.sh
          - slug: prepare-agent-workspace
            title: Prepare managed agent workspace
            type: run
            run: |
              set -Eeuo pipefail
              rm -rf /workspace/repo /workspace/evidence
              ln -s /workspace/ambience /workspace/repo
              ln -s /tmp/evidence /workspace/evidence
          - slug: run-issue-contract
            title: Create issue contract
            type: agent
            working_directory: /workspace/repo
            agent:
              slot: implementation
              prompt_file: .github/agent/prompt-issue-contract.md
              prompt: The repository is available at /workspace/repo and the required evidence/output directory is /workspace/evidence. Handoff files staged by previous phases are already under /workspace/evidence. Follow the stage prompt exactly and write the required JSON and Markdown files there.
          - slug: collect
            title: Collect evidence
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/issue-contract.sh
          - slug: finalize
            title: Finalize issue contract
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/issue-contract.sh
          - slug: emit
            title: Emit issue contract
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/issue-contract.sh
        timeout_seconds: 1200
        managed: true
        checkout:
          repo: nelsong6/ambience
          ref: main
          path: /workspace/ambience
        working_directory: /workspace
  - name: llm-work
    kind: k8s_job
    run_on: success
    purpose: work
    workflow_filename: ""
    workflow_ref: main
    inputs:
      claude_ca_namespace: ${{ phases.prepare.outputs.claude_ca_namespace }}
      claude_namespace: ${{ phases.prepare.outputs.claude_namespace }}
      image_tag: ${{ phases.prepare.outputs.image_tag }}
      issue_contract: ${{ phases.prepare.outputs.issue_contract }}
      namespace: ${{ phases.prepare.outputs.namespace }}
      validation_url: ${{ phases.prepare.outputs.validation_url }}
    outputs:
      - test_plan
      - implementation
      - branch_name
    requirements: {}
    verify: false
    recycle_policy: null
    evidence_verification_gate: false
    depends_on:
      - prepare
    jobs:
      - id: llm-test-plan
        name: 'LLM: author test plan'
        image: ""
        command: []
        args: []
        env:
          AGENT_CONTAINER_TAG: latest
          AZURE_SUBSCRIPTION_ID: aee0cbd2-8074-4001-b610-0f8edb4eaa3c
        steps:
          - slug: clone
            title: Clone repo
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/test-plan.sh
          - slug: prepare
            title: Prepare context
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/test-plan.sh
          - slug: prepare-agent-workspace
            title: Prepare managed agent workspace
            type: run
            run: |
              set -Eeuo pipefail
              rm -rf /workspace/repo /workspace/evidence
              ln -s /workspace/ambience /workspace/repo
              ln -s /tmp/evidence /workspace/evidence
          - slug: run-test-plan
            title: Create test plan
            type: agent
            working_directory: /workspace/repo
            agent:
              slot: implementation
              prompt_file: .github/agent/prompt-test-plan.md
              prompt: The repository is available at /workspace/repo and the required evidence/output directory is /workspace/evidence. Handoff files staged by previous phases are already under /workspace/evidence. Follow the stage prompt exactly and write the required JSON and Markdown files there.
          - slug: collect
            title: Collect evidence
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/test-plan.sh
          - slug: finalize
            title: Finalize test plan
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/test-plan.sh
          - slug: emit
            title: Emit test plan
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/test-plan.sh
        timeout_seconds: 1200
        managed: true
        checkout:
          repo: nelsong6/ambience
          ref: main
          path: /workspace/ambience
        working_directory: /workspace
      - id: llm-implement
        name: 'LLM: implement'
        image: ""
        command: []
        args: []
        env:
          AGENT_CONTAINER_TAG: latest
          AZURE_SUBSCRIPTION_ID: aee0cbd2-8074-4001-b610-0f8edb4eaa3c
        steps:
          - slug: clone
            title: Clone repo
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/implement.sh
          - slug: prepare
            title: Prepare context
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/implement.sh
          - slug: prepare-agent-workspace
            title: Prepare managed agent workspace
            type: run
            run: |
              set -Eeuo pipefail
              rm -rf /workspace/repo /workspace/evidence
              ln -s /workspace/ambience /workspace/repo
              ln -s /tmp/evidence /workspace/evidence
          - slug: run-implementation
            title: Run implementation
            type: agent
            working_directory: /workspace/repo
            agent:
              slot: implementation
              prompt_file: .github/agent/prompt-implementation.md
              prompt: The repository is available at /workspace/repo and the required evidence/output directory is /workspace/evidence. Handoff files staged by previous phases are already under /workspace/evidence. Make the requested code changes, run appropriate checks, and write the required implementation JSON and Markdown. Do not commit, push, open a PR, or edit runner-local configuration; the workflow publishes the branch after this managed agent step.
          - slug: collect
            title: Collect evidence
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/implement.sh
          - slug: publish-branch
            title: Publish implementation branch
            type: run
            run: |
              set -Eeuo pipefail
              branch="glimmung/${GLIMMUNG_RUN_ID}"
              cd /workspace/repo
              git add -A
              if git diff --cached --quiet; then
                ahead="$(git rev-list --count HEAD ^origin/main 2>/dev/null || printf "0")"
                if [ "${ahead}" = "0" ]; then
                  echo "managed implementation agent produced no changes" >&2
                  exit 1
                fi
              else
                git commit -m "agent: address ${GLIMMUNG_ISSUE_NUMBER:-${GLIMMUNG_RUN_ID}}" -m "${GLIMMUNG_ISSUE_TITLE:-Glimmung issue}" -m "Glimmung run ${GLIMMUNG_RUN_ID}."
              fi
              token_json="$(curl -fsS -X POST -H "x-glimmung-attempt-token: ${GLIMMUNG_ATTEMPT_TOKEN}" "${GLIMMUNG_GITHUB_TOKEN_URL}")"
              gh_token="$(printf "%s" "$token_json" | jq -r ".token")"
              [ -n "$gh_token" ] && [ "$gh_token" != "null" ] || { echo "github token response did not include token" >&2; exit 1; }
              auth_header="Authorization: Basic $(printf "x-access-token:%s" "$gh_token" | base64 | tr -d "\n")"
              git -c "http.extraHeader=${auth_header}" fetch origin main
              git rebase origin/main
              git -c "http.extraHeader=${auth_header}" push origin "HEAD:${branch}"
          - slug: push-branch
            title: Confirm branch push
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/implement.sh
          - slug: rebuild-env
            title: Rebuild validation env
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/implement.sh
          - slug: finalize
            title: Finalize implementation
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/implement.sh
          - slug: emit
            title: Emit implementation
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/implement.sh
        timeout_seconds: 3000
        managed: true
        checkout:
          repo: nelsong6/ambience
          ref: main
          path: /workspace/ambience
        working_directory: /workspace
  - name: llm-verify
    kind: k8s_job
    run_on: success
    purpose: verification
    workflow_filename: ""
    workflow_ref: main
    inputs:
      branch_name: ${{ phases.llm-work.outputs.branch_name }}
      claude_ca_namespace: ${{ phases.prepare.outputs.claude_ca_namespace }}
      claude_namespace: ${{ phases.prepare.outputs.claude_namespace }}
      implementation: ${{ phases.llm-work.outputs.implementation }}
      issue_contract: ${{ phases.prepare.outputs.issue_contract }}
      namespace: ${{ phases.prepare.outputs.namespace }}
      test_plan: ${{ phases.llm-work.outputs.test_plan }}
      validation_url: ${{ phases.prepare.outputs.validation_url }}
    outputs:
      - verification
    requirements: {}
    verify: true
    recycle_policy: null
    evidence_verification_gate: false
    depends_on:
      - llm-work
    jobs:
      - id: llm-verify
        name: 'LLM: Run tests'
        image: ""
        command: []
        args: []
        env:
          AGENT_CONTAINER_TAG: latest
          AGENT_SCREENSHOT_CONTAINER: artifacts
          AGENT_SCREENSHOT_CONTAINER_URL: https://glimmung.romaine.life/v1/artifacts
          AGENT_SCREENSHOT_STORAGE_ACCOUNT: romaineglimmungartifacts
          AZURE_SUBSCRIPTION_ID: aee0cbd2-8074-4001-b610-0f8edb4eaa3c
        steps:
          - slug: clone
            title: Clone repo
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/verify.sh
          - slug: prepare
            title: Prepare context
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/verify.sh
          - slug: prepare-agent-workspace
            title: Prepare managed agent workspace
            type: run
            run: |
              set -Eeuo pipefail
              rm -rf /workspace/repo /workspace/evidence
              ln -s /workspace/ambience /workspace/repo
              ln -s /tmp/evidence /workspace/evidence
          - slug: run-verification
            title: Run verification
            type: agent
            working_directory: /workspace/repo
            agent:
              slot: verification
              prompt_file: .github/agent/prompt-verification.md
              prompt: The repository is available at /workspace/repo and the required evidence/output directory is /workspace/evidence. The validation URL is available in GLIMMUNG_INPUT_VALIDATION_URL. Handoff files from issue-contract, test-plan, and implementation are already under /workspace/evidence. Follow the verification prompt exactly and write the required verification JSON and Markdown there.
          - slug: collect
            title: Collect evidence
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/verify.sh
          - slug: finalize
            title: Finalize verification
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/verify.sh
          - slug: upload-screenshots
            title: Upload screenshots
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/verify.sh
          - slug: emit
            title: Emit verification
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/verify.sh
        timeout_seconds: 2400
        managed: true
        checkout:
          repo: nelsong6/ambience
          ref: main
          path: /workspace/ambience
        working_directory: /workspace
  - name: evidence-gate
    kind: k8s_job
    run_on: success
    purpose: evidence_gate
    workflow_filename: ""
    workflow_ref: main
    inputs:
      verification: ${{ phases.llm-verify.outputs.verification }}
    outputs: []
    requirements: {}
    verify: false
    recycle_policy:
      max_attempts: 3
      "on":
        - verify_fail
        - verify_malformed
      lands_at: prepare
    evidence_verification_gate: true
    depends_on:
      - llm-verify
    jobs:
      - id: evidence-verification-gate
        name: Check evidence
        image: ""
        command: []
        args: []
        env: {}
        steps:
          - slug: evaluate-verdict
            title: Evaluate verification verdict
            type: run
            run: |-
              set -Eeuo pipefail
              raw="${GLIMMUNG_INPUT_VERIFICATION:-}"
              if [ -z "${raw}" ]; then
                echo "verification input is empty" >&2
                exit 2
              fi
              status="$(printf '%s' "${raw}" | jq -er '.status // empty')" || {
                echo "verification input is not valid JSON or missing status" >&2
                exit 2
              }
              printf "verification.status = '%s'\n" "${status}"
              printf '%s' "${raw}" | jq -r '.reasons[]? | "reason: \(.)"'
              if [ "${status}" = "pass" ]; then
                exit 0
              fi
              exit 1
              	
            shell: bash
        timeout_seconds: 60
        managed: true
  - name: cleanup_early
    kind: k8s_job
    run_on: always
    purpose: teardown
    workflow_filename: ""
    workflow_ref: main
    inputs: {}
    outputs: []
    requirements: {}
    verify: false
    recycle_policy: null
    evidence_verification_gate: false
    depends_on:
      - evidence-gate
    jobs:
      - id: env-destroy
        name: Cleanup
        image: ""
        command: []
        args: []
        env:
          AZURE_SUBSCRIPTION_ID: aee0cbd2-8074-4001-b610-0f8edb4eaa3c
        steps:
          - slug: describe-pre-teardown
            title: Describe pre-teardown
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/env-destroy.sh
          - slug: uninstall-helm-release
            title: Uninstall Helm release
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/env-destroy.sh
          - slug: delete-namespace
            title: Delete namespace
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/env-destroy.sh
          - slug: emit
            title: Emit cleanup
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/env-destroy.sh
        timeout_seconds: 600
        managed: true
        checkout:
          repo: nelsong6/ambience
          ref: main
          path: /workspace/ambience
        working_directory: /workspace
    skip_when_preserve_test_env: true
  - name: touchpoint
    kind: k8s_job
    run_on: success
    purpose: review_touchpoint
    workflow_filename: ""
    workflow_ref: main
    inputs: {}
    outputs: []
    requirements: {}
    verify: false
    recycle_policy: null
    evidence_verification_gate: false
    depends_on:
      - cleanup_early
    jobs:
      - id: pr-touchpoint
        name: PR touchpoint
        primitive: pr_touchpoint
        image: ""
        command: []
        args: []
        env: {}
        steps:
          - slug: ensure-pr-touchpoint
            title: Ensure PR touchpoint
            type: run
            run: |
              set -Eeuo pipefail
              if [ -z "${GLIMMUNG_PR_TOUCHPOINT_URL:-}" ]; then
                echo "GLIMMUNG_PR_TOUCHPOINT_URL is not configured" >&2
                exit 2
              fi
              echo "Ensuring PR touchpoint for ${GLIMMUNG_RUN_REF:-unknown run}"
              response="$(mktemp)"
              status="$(curl -sS -o "${response}" -w '%{http_code}' -X POST "${GLIMMUNG_PR_TOUCHPOINT_URL}")" || {
                code="$?"
                echo "PR touchpoint request failed with curl exit ${code}" >&2
                exit "${code}"
              }
              cat "${response}" | jq .
              if [ "${status}" -lt 200 ] || [ "${status}" -ge 300 ]; then
                echo "PR touchpoint request returned HTTP ${status}" >&2
                exit 1
              fi
              result_status="$(jq -r '.status // empty' "${response}")"
              if [ "${result_status}" = "skipped" ]; then
                echo "PR touchpoint skipped: $(jq -r '.reason // "no reason"' "${response}")"
                exit 0
              fi
              if [ "${result_status}" != "ensured" ]; then
                echo "PR touchpoint returned unexpected status '${result_status}'" >&2
                exit 2
              fi
              pr_number="$(jq -r '.pr_number // empty' "${response}")"
              touchpoint_ref="$(jq -r '.touchpoint_ref // empty' "${response}")"
              html_url="$(jq -r '.html_url // empty' "${response}")"
              {
                if [ -n "${pr_number}" ]; then printf 'pr_number=%s\n' "${pr_number}"; fi
                if [ -n "${touchpoint_ref}" ]; then printf 'touchpoint_ref=%s\n' "${touchpoint_ref}"; fi
                if [ -n "${html_url}" ]; then printf 'pr_url=%s\n' "${html_url}"; fi
              } >>"${GLIMMUNG_OUTPUT_FILE}"
              echo "PR touchpoint ensured: ${touchpoint_ref:-unknown}"
              if [ -n "${html_url}" ]; then
                echo "PR URL: ${html_url}"
              fi
            shell: bash
        timeout_seconds: 120
        managed: true
  - name: touchpoint_gate
    kind: k8s_job
    run_on: success
    purpose: review_gate
    workflow_filename: k8s_job:touchpoint_gate
    workflow_ref: main
    inputs: {}
    outputs: []
    requirements: {}
    verify: false
    recycle_policy: null
    evidence_verification_gate: false
    depends_on:
      - touchpoint
    jobs:
      - id: pr-merge
        name: PR merge
        primitive: pr_merge
        image: ""
        command: []
        args: []
        env: {}
        steps:
          - slug: merge-pull-request
            title: Idempotently merge the touchpoint PR
            type: run
            run: |
              set -Eeuo pipefail
              if [ -z "${GLIMMUNG_PR_MERGE_URL:-}" ]; then
                echo "GLIMMUNG_PR_MERGE_URL is not configured" >&2
                exit 2
              fi
              echo "Merging PR for ${GLIMMUNG_RUN_REF:-unknown run}"
              response="$(mktemp)"
              status="$(curl -sS -o "${response}" -w '%{http_code}' -X POST "${GLIMMUNG_PR_MERGE_URL}")" || {
                code="$?"
                echo "PR merge request failed with curl exit ${code}" >&2
                exit "${code}"
              }
              cat "${response}" | jq .
              if [ "${status}" -lt 200 ] || [ "${status}" -ge 300 ]; then
                echo "PR merge request returned HTTP ${status}" >&2
                exit 1
              fi
              result_status="$(jq -r '.status // empty' "${response}")"
              case "${result_status}" in
                merged)
                  echo "PR merged: $(jq -r '.merge_commit_sha // ""' "${response}")"
                  ;;
                already_merged)
                  echo "PR was already merged (idempotent success)"
                  ;;
                *)
                  echo "PR merge returned unexpected status '${result_status}'" >&2
                  exit 2
                  ;;
              esac
              pr_number="$(jq -r '.pr_number // empty' "${response}")"
              merge_commit="$(jq -r '.merge_commit_sha // empty' "${response}")"
              {
                if [ -n "${pr_number}" ]; then printf 'pr_number=%s\n' "${pr_number}"; fi
                if [ -n "${merge_commit}" ]; then printf 'merge_commit_sha=%s\n' "${merge_commit}"; fi
                printf 'merge_status=%s\n' "${result_status}"
              } >>"${GLIMMUNG_OUTPUT_FILE}"
            shell: bash
        timeout_seconds: 120
        managed: true
  - name: cleanup_final
    kind: k8s_job
    run_on: always
    purpose: teardown
    workflow_filename: ""
    workflow_ref: main
    inputs: {}
    outputs: []
    requirements: {}
    verify: false
    recycle_policy: null
    evidence_verification_gate: false
    depends_on:
      - touchpoint_gate
    jobs:
      - id: env-destroy-final
        name: Final cleanup
        image: ""
        command: []
        args: []
        env:
          AZURE_SUBSCRIPTION_ID: aee0cbd2-8074-4001-b610-0f8edb4eaa3c
        steps:
          - slug: describe-pre-teardown
            title: Describe pre-teardown
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/env-destroy.sh
          - slug: uninstall-helm-release
            title: Uninstall Helm release
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/env-destroy.sh
          - slug: delete-namespace
            title: Delete namespace
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/env-destroy.sh
          - slug: emit
            title: Emit cleanup
            type: run
            run: /bin/bash /workspace/ambience/scripts/glimmung-native/env-destroy.sh
        timeout_seconds: 600
        managed: true
        checkout:
          repo: nelsong6/ambience
          ref: main
          path: /workspace/ambience
        working_directory: /workspace
pr:
  recycle_policy:
    max_attempts: 3
    "on":
      - pr_review_changes_requested
    lands_at: prepare
budget:
  total: 25
default_requirements:
  required_evidence:
    - duration_seconds: 6
      id: workflow-default-video
      kind: video
      label: primary browser flow
      must_show: browser behavior changed by this run
metadata: {}
